<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Baneo por ID</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        #did { display: block; background: #eee; padding: 10px; margin: 15px 0; border-radius: 5px; font-family: monospace; word-break: break-all; color: #333; }
        button { background: #e74c3c; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Control de Acceso</h2>
        <p>Tu identificador único es:</p>
        <span id="did">Generando ID...</span>
        <button id="btnBan">Banear este dispositivo</button>
        <p id="status" style="font-size: 12px; margin-top: 10px; color: #666;"></p>
    </div>

    <!-- Carga desde JSDelivr para máxima compatibilidad -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>

    <script>
        // Tu configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "rascay-d6d3d",
            storageBucket: "rascay-d6d3d.firebasestorage.app",
            messagingSenderId: "991120220829",
            appId: "1:991120220829:web:15c8dfa4677f701e582a74"
        };

        // Inicializar Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Función para obtener ID persistente
        function obtenerIdentificador() {
            let id = localStorage.getItem('user_token');
            if (!id) {
                // Si no hay ID, creamos uno nuevo con marca de tiempo
                id = 'ID-' + Math.random().toString(36).substr(2, 10) + '-' + Date.now();
                localStorage.setItem('user_token', id);
            }
            return id;
        }

        const miID = obtenerIdentificador();
        document.getElementById('did').innerText = miID;

        // 1. Verificar Baneo al cargar
        db.ref('baneados/' + miID).on('value', (snapshot) => {
            if (snapshot.val() === true) {
                alert("LO SENTIMOS: Este dispositivo tiene el acceso prohibido.");
                window.location.replace("https://www.google.com");
            }
        });

        // 2. Acción del botón para banear
        document.getElementById('btnBan').onclick = function() {
            document.getElementById('status').innerText = "Procesando baneo...";
            db.ref('baneados/' + miID).set(true)
                .then(() => {
                    alert("ID registrada en la lista negra.");
                    location.reload();
                })
                .catch((error) => {
                    console.error(error);
                    document.getElementById('status').innerText = "Error: Verifica las reglas de Firebase.";
                });
        };
    </script>
</body>
</html>
