<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Baneo - GitHub Pages</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 10px 20px; background: red; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Control de Acceso</h1>
        <p>Tu IP: <span id="ip">Detectando...</span></p>
        <button id="btn">Banear mi IP</button>
    </div>

    <!-- Scripts de Firebase VERSION COMPAT (Más estables para navegadores) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // Tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "rascay-d6d3d",
            storageBucket: "rascay-d6d3d.firebasestorage.app",
            messagingSenderId: "991120220829",
            appId: "1:991120220829:web:15c8dfa4677f701e582a74"
        };

        // Inicializar
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function init() {
            try {
                const res = await fetch('https://ipify.org');
                const data = await res.json();
                const ip = data.ip;
                const safeIp = ip.split('.').join('_');
                
                document.getElementById('ip').innerText = ip;

                // 1. Verificar Ban
                db.ref('baneados/' + safeIp).once('value', (snapshot) => {
                    if (snapshot.val() === true) {
                        alert("IP Bloqueada");
                        window.location.replace("https://google.com");
                    }
                });

                // 2. Acción del Botón
                document.getElementById('btn').onclick = function() {
                    db.ref('baneados/' + safeIp).set(true).then(() => {
                        alert("Baneado correctamente");
                        location.reload();
                    });
                };

            } catch (e) {
                console.error("Error:", e);
            }
        }

        init();
    </script>
</body>
</html>
