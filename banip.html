<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguridad de Dispositivo</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        button { padding: 12px 24px; background: #dc3545; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Control de Acceso</h1>
        <p>ID Dispositivo: <br><strong id="did">Detectando...</strong></p>
        <button id="btn">Banear este dispositivo</button>
    </div>

    <!-- CARGA DESDE JSDELIVR (EVITA ERRORES MIME Y CORS DE GSTATIC/CLOUDFLARE) -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>

    <script>
        // Tu configuración
        const firebaseConfig = {
            apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebasedatabase.app",
            projectId: "rascay-d6d3d",
            storageBucket: "rascay-d6d3d.firebasestorage.app",
            messagingSenderId: "991120220829",
            appId: "1:991120220829:web:15c8dfa4677f701e582a74"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Obtener o crear ID único en el navegador
        function obtenerID() {
            let id = localStorage.getItem('id_seguridad');
            if (!id) {
                id = 'user-' + Math.random().toString(36).substring(2, 15);
                localStorage.setItem('id_seguridad', id);
            }
            return id;
        }

        const miID = obtenerID();
        document.getElementById('did').innerText = miID;

        // Verificar baneo
        db.ref('baneados/' + miID).once('value', (snapshot) => {
            if (snapshot.val() === true) {
                alert("ACCESO BLOQUEADO");
                window.location.replace("https://google.com");
            }
        });

        // Función del botón
        document.getElementById('btn').onclick = function() {
            db.ref('baneados/' + miID).set(true).then(() => {
                alert("Dispositivo baneado.");
                location.reload();
            });
        };
    </script>
</body>
</html>
