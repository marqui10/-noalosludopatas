<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Money Scratch - MegaJackpot Pro</title>
    <style>
        :root {
            --bg: #0f1226;
            --card: #15183a;
            --accent: #7c8cff;
            --text: #e9ecff;
            --win-bg: #19c37d;
            --opened-bg: #ffd166;
            --closed-bg: #ef476f;
            --gold-1: #bf953f;
            --gold-2: #fcf6ba;
            --gold-3: #b38728;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: radial-gradient(1200px 800px at 10% -10%, #1b1f49 0%, transparent 60%), var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            touch-action: manipulation;
            overflow-x: hidden;
            transition: background 0.5s;
        }

        body.megajackpot-active {
            background: radial-gradient(circle at center, #aa771c 0%, #0f1226 70%), #000 !important;
            animation: bodyShake 0.1s infinite;
        }

        @keyframes bodyShake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 75% { transform: translate(2px, -2px); } }

        .wrap { width: min(95vw, 500px); z-index: 10; position: relative;}
        .title { text-align: center; margin-bottom: 20px; letter-spacing: 1px; }

        #codeGate {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .inputBox { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        input { padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0b0d22; color: white; text-align: center; font-size: 1rem; }
        button { padding: 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--accent); color: #0b0d22; }

        #gameBoard { display: none; width: 100%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .cell {
            position: relative;
            aspect-ratio: 1/1;
            background: #0b0d22;
            border-radius: 12px;
            overflow: hidden;
            display: grid;
            place-items: center;
            border: 2px solid rgba(255,255,255,0.05);
            transition: all 0.4s;
        }

        .symbol { font-size: 1.2rem; font-weight: 800; color: #fff; z-index: 1; }
        canvas.scratch-layer { position: absolute; inset: 0; cursor: crosshair; touch-action: none; width: 100%; height: 100%; z-index: 5; }

        .status-info { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9rem; color: var(--accent); font-weight: bold; }
        
        /* BANNER DE PREMIO MEJORADO */
        .prize-banner {
            margin-top: 20px;
            text-align: center;
            padding: 25px;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 15px;
            display: none;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .ticket {
            background: #fff;
            color: #1a1a1a;
            padding: 20px;
            border-radius: 4px;
            margin: 15px 0;
            text-align: center;
            border: 1px dashed #000;
            position: relative;
            box-shadow: 0 4px 0 #ccc;
        }
        .ticket::before, .ticket::after {
            content: ''; position: absolute; width: 20px; height: 20px; background: var(--card); border-radius: 50%; top: 50%; transform: translateY(-50%);
        }
        .ticket::before { left: -10px; } .ticket::after { right: -10px; }

        .ticket-code { font-family: 'Courier New', Courier, monospace; font-size: 1.6rem; font-weight: 900; display: block; color: #000; letter-spacing: 2px; margin: 10px 0; }
        .ticket-amount { font-size: 2rem; font-weight: 900; color: #19c37d; display: block; }
        
        .btn-reset { background: var(--win-bg); color: #000; margin-top: 15px; width: 100%; border-radius: 10px; padding: 16px; font-weight: 800; border: none; cursor: pointer; text-transform: uppercase; }

        .cell.win-match { background: var(--win-bg) !important; border-color: #fff; transform: scale(1.05); z-index: 2; }
        .cell.opened-no-win { background: var(--opened-bg) !important; border-color: #ff9f1c; }
        .cell.opened-no-win .symbol { color: #000; }
        .cell.not-opened { background: var(--closed-bg) !important; opacity: 0.4; }

        /* MEGAJACKPOT */
        @keyframes goldFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .cell.megajackpot {
            background: linear-gradient(45deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1)) !important;
            background-size: 400% 400% !important;
            animation: goldFlow 3s ease infinite;
            border: 4px solid #fff !important;
            z-index: 15;
        }

        #confettiCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 5; pointer-events: none; display: none; }
    </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div class="wrap">
    <h2 class="title" id="gameTitle">💰 Money Scratch</h2>

    <div id="codeGate">
        <div class="inputBox">
            <input type="password" id="codeInput" placeholder="Introduce tu Código">
            <button id="codeBtn">ENTRAR A JUGAR</button>
        </div>
        <p id="codeMsg" style="margin-top:15px; font-size:0.85rem; color: #9aa3c7;"></p>
    </div>

    <div id="gameBoard">
        <div class="status-info">
            <span id="scratchesLeft">Intentos: 5</span>
            <span id="usesLeft" style="color:#ffd166">Partidas restantes: -</span>
        </div>
        <div class="grid" id="grid"></div>

        <div class="prize-banner" id="resultBanner">
            <h2 id="resultTitle"></h2>
            <div id="ticketContainer"></div>
            <p id="resultDesc" style="font-size: 0.8rem; opacity: 0.8;"></p>
            <button id="nextGameBtn" class="btn-reset">JUGAR OTRA PARTIDA</button>
            <button onclick="location.reload()" style="background:transparent; color:white; margin-top:20px; border:none; cursor:pointer; font-size:0.8rem; opacity:0.5;">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d",
        storageBucket: "rascay-d6d3d.appspot.com",
        messagingSenderId: "991120220829",
        appId: "1:991120220829:web:15c8dfa4677f701e582a74"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const MAX_SCRATCHES = 5;
    const OWNER_PASS = "TINGUI"; 
    let isOwnerSession = false;
    let currentCode = "";
    let sessionUses = 0;
    let scratchedIndices = new Set();
    let gameSymbols = [];
    const BASE_POOL = ['5€','10€','20€','50€','100€','200€','500€'];

    document.getElementById('codeBtn').addEventListener('click', async () => {
        const code = document.getElementById('codeInput').value.trim().toUpperCase();
        if(code === OWNER_PASS) {
            isOwnerSession = true;
            sessionUses = 999;
            setupGame();
            return;
        }

        try {
            const snap = await db.ref('ryg/' + code).get();
            if(snap.exists()){
                currentCode = code;
                let data = snap.val();
                sessionUses = data.usos_restantes || 1;
                
                // Descontamos el primer uso al entrar
                if(sessionUses > 1) {
                    await db.ref('ryg/' + code).update({ usos_restantes: sessionUses - 1 });
                    sessionUses--;
                } else {
                    await db.ref('ryg/' + code).remove();
                    sessionUses = 0;
                }
                setupGame();
            } else {
                document.getElementById('codeMsg').textContent = "Código inválido o agotado.";
            }
        } catch (e) { console.error(e); }
    });

    function setupGame() {
        scratchedIndices.clear();
        document.getElementById('grid').innerHTML = '';
        document.getElementById('ticketContainer').innerHTML = '';
        document.getElementById('resultBanner').style.display = 'none';
        document.getElementById('codeGate').style.display = 'none';
        document.getElementById('gameBoard').style.display = 'block';
        document.getElementById('scratchesLeft').textContent = `Intentos: ${MAX_SCRATCHES}`;
        document.getElementById('usesLeft').textContent = isOwnerSession ? "MODO DUEÑO" : `Sesión: ${sessionUses + 1} partidas`;
        
        document.body.className = '';
        gameSymbols = [];
        for(let i=0; i<2; i++) gameSymbols.push({val: 'NADA'});
        while(gameSymbols.length < 12) {
            gameSymbols.push({val: BASE_POOL[Math.floor(Math.random() * BASE_POOL.length)]});
        }
        gameSymbols.sort(() => Math.random() - 0.5);

        gameSymbols.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'cell';
            div.id = `cell-${i}`;
            div.innerHTML = `<div class="symbol">${s.val}</div><canvas class="scratch-layer" id="canv-${i}"></canvas>`;
            document.getElementById('grid').appendChild(div);
            initScratch(`canv-${i}`, i);
        });
    }

    function initScratch(canvasId, index) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.fillStyle = '#cfd4db';
        ctx.fillRect(0,0,canvas.width,canvas.height);

        let drawing = false;
        const startAction = () => {
            if(scratchedIndices.size >= MAX_SCRATCHES && !scratchedIndices.has(index)) return;
            drawing = true;
            if(!scratchedIndices.has(index)) {
                scratchedIndices.add(index);
                document.getElementById('scratchesLeft').textContent = `Intentos: ${MAX_SCRATCHES - scratchedIndices.size}`;
            }
        };

        const moveAction = (e) => {
            if(!drawing) return;
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(cx-r.left, cy-r.top, 25, 0, Math.PI * 2); ctx.fill();
            checkThreshold(canvas, ctx, index);
        };

        canvas.addEventListener('mousedown', startAction);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(); });
        window.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', moveAction);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveAction(e); });
    }

    function checkThreshold(canvas, ctx, index) {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let cleared = 0;
        for (let i = 3; i < data.length; i += 40) { if (data[i] === 0) cleared++; }
        if (cleared > (data.length / 40) * 0.60) {
            canvas.style.opacity = "0"; canvas.style.pointerEvents = "none";
            if(scratchedIndices.size >= MAX_SCRATCHES) setTimeout(finishGame, 600);
        }
    }

    async function finishGame() {
        const picked = Array.from(scratchedIndices).map(idx => gameSymbols[idx]);
        const counts = {};
        picked.forEach(s => counts[s.val] = (counts[s.val] || 0) + 1);

        let winVal = null;
        let isMega = false;

        for (let v in counts) {
            if (v !== 'NADA') {
                if (counts[v] >= 3) { winVal = v; if(counts[v] === 5) isMega = true; break; }
            }
        }

        if(isMega) { document.body.classList.add('megajackpot-active'); startConfetti(); }

        gameSymbols.forEach((s, i) => {
            document.getElementById(`canv-${i}`).style.opacity = "0";
            const cell = document.getElementById(`cell-${i}`);
            if (scratchedIndices.has(i)) {
                if (winVal && s.val === winVal) cell.classList.add(isMega ? 'megajackpot' : 'win-match');
                else cell.classList.add('opened-no-win');
            } else cell.classList.add('not-opened');
        });

        const banner = document.getElementById('resultBanner');
        banner.style.display = 'block';
        document.getElementById('nextGameBtn').style.display = sessionUses > 0 || isOwnerSession ? 'block' : 'none';

        if(winVal) {
            let finalPrize = isMega ? "10.000€" : winVal;
            const winCode = "RECIBO-" + Math.random().toString(36).substring(2,8).toUpperCase();
            document.getElementById('resultTitle').textContent = isMega ? "⚡ JACKPOT LEGENDARIO ⚡" : "¡TIENES PREMIO! 🤑";
            document.getElementById('ticketContainer').innerHTML = `
                <div class="ticket">
                    <small>CÓDIGO DE COBRO</small>
                    <span class="ticket-code">${winCode}</span>
                    <span class="ticket-amount">${finalPrize}</span>
                    <small>VALIDEZ: 24 HORAS</small>
                </div>`;
            document.getElementById('resultDesc').textContent = "HAZ UNA CAPTURA DE PANTALLA PARA RECLAMAR EL PREMIO.";
            await db.ref('prizes/' + winCode).set({ amount: finalPrize, date: new Date().toISOString(), status: "pendiente" });
        } else {
            document.getElementById('resultTitle').textContent = "CASI LO TIENES...";
            document.getElementById('resultDesc').textContent = sessionUses > 0 ? "¡No te rindas! Te quedan más intentos en tu ticket." : "Ticket agotado. ¡Suerte la próxima vez!";
        }
    }

    let confettiInterval;
    function startConfetti() {
        const canvas = document.getElementById('confettiCanvas');
        canvas.style.display = 'block';
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let pieces = [];
        for (let i = 0; i < 80; i++) pieces.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height-canvas.height, size: Math.random()*8+4, ySpeed: Math.random()*4+2, color: '#bf953f' });
        function update() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pieces.forEach(p => { p.y += p.ySpeed; if(p.y > canvas.height) p.y = -10; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size); });
            confettiInterval = requestAnimationFrame(update);
        }
        update();
    }

    document.getElementById('nextGameBtn').addEventListener('click', async () => {
        cancelAnimationFrame(confettiInterval);
        document.getElementById('confettiCanvas').style.display = 'none';
        
        if(!isOwnerSession && sessionUses > 0) {
            // Descontamos el uso para la siguiente partida
            sessionUses--;
            const snap = await db.ref('ryg/' + currentCode).get();
            if(snap.exists()){
                if(sessionUses > 0) await db.ref('ryg/' + currentCode).update({ usos_restantes: sessionUses });
                else await db.ref('ryg/' + currentCode).remove();
            }
        }
        setupGame();
    });
</script>
</body>
</html>
