<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino Elite - Acceso Restringido</title>
    <style>
        :root {
            --gold: #bf953f;
            --gold-light: #fcf6ba;
            --dark-bg: #0a0c1a;
            --panel-bg: #15183a;
            --text: #ffffff;
            --accent-red: #ff3e3e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1e224f 0%, #0a0c1a 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- PANTALLA DE LOGIN --- */
        #loginScreen {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            width: 100%;
            max-width: 400px;
            z-index: 10000;
        }

        .login-logo { font-size: 3rem; margin-bottom: 10px; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--gold);
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--gold-light); box-shadow: 0 0 10px var(--gold); }

        .btn-access {
            background: linear-gradient(to bottom, var(--gold-light), var(--gold));
            color: black;
            border: none;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-access:hover { transform: scale(1.02); filter: brightness(1.1); }

        /* --- INTERFAZ DEL CASINO (Oculta al inicio) --- */
        #mainCasino {
            display: none; /* Se activa tras validar */
            width: 100%;
            height: 100vh;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 20px;
            box-sizing: border-box;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to bottom, var(--gold-light) 0%, var(--gold) 50%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }

        .lobby {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .game-card {
            background: var(--panel-bg);
            height: 220px;
            border-radius: 15px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.4s;
        }

        .game-card:hover { transform: translateY(-10px); box-shadow: 0 0 25px var(--gold); }
        .game-card div { font-size: 3.5rem; }
        .game-card p { color: var(--gold); font-weight: bold; margin-top: 10px; }

        /* --- MODAL --- */
        #gameModal { display: none; position: fixed; inset: 0; background: #000; z-index: 99999; }
        #gameIframe { width: 100%; height: 100%; border: none; }
        .close-game { position: absolute; top: 20px; right: 30px; font-size: 50px; color: #fff; cursor: pointer; z-index: 100000; }

        #errorMsg { color: var(--accent-red); font-size: 0.85rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-logo">👑</div>
        <h2 style="color: var(--gold); margin: 0;">ELITE ACCESS</h2>
        <p style="color: #888; font-size: 0.8rem; margin-bottom: 20px;">INGRESE SUS CREDENCIALES</p>
        
        <input type="text" id="ticketCode" placeholder="Código de Ticket">
        <input type="text" id="discordUser" placeholder="Usuario de Discord">
        
        <div id="errorMsg">Ticket no válido o acceso denegado.</div>
        
        <button class="btn-access" onclick="intentarEntrar()">Validar y Entrar</button>
    </div>

    <div id="mainCasino">
        <h1>CASINO ELITE</h1>
        <p id="welcomeText" style="color: var(--gold-light); margin-bottom: 30px;"></p>

        <div class="lobby">
            <div onclick="openGame('rascaygana.html')" class="game-card"><div>🎫</div><p>RASCA Y GANA</p></div>
            <div onclick="openGame('ruleta.html')" class="game-card"><div>🎡</div><p>RULETA</p></div>
            <div onclick="openGame('tragaperras.html')" class="game-card"><div>🎰</div><p>SLOTS</p></div>
            <div onclick="openGame('blackjack.html')" class="game-card"><div>🃏</div><p>BLACKJACK</p></div>
            <div onclick="openGame('minas.html')" class="game-card"><div>💣</div><p>MINAS</p></div>
            <div onclick="openGame('crashgame.html')" class="game-card"><div>🚀</div><p>CRASH</p></div>
        </div>
    </div>

    <div id="gameModal">
        <span class="close-game" onclick="closeGame()">&times;</span>
        <iframe id="gameIframe" src=""></iframe>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
            authDomain: "rascay-d6d3d.firebaseapp.com",
            databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "rascay-d6d3d"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let activeTicket = "";

        // FUNCIÓN PRINCIPAL DE ENTRADA
        function intentarEntrar() {
            const ticketInput = document.getElementById('ticketCode').value.trim();
            const discordInput = document.getElementById('discordUser').value.trim();
            const error = document.getElementById('errorMsg');

            if (!ticketInput || !discordInput) {
                error.innerText = "Por favor, completa ambos campos.";
                error.style.display = "block";
                return;
            }

            // BUSCAMOS EL TICKET EN LA RUTA CODES/
            db.ref('codes/' + ticketInput).once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const data = snapshot.val();

                    if (data.estado === 'baneado') {
                        window.location.href = 'aviso.html';
                        return;
                    }

                    // ÉXITO: Guardamos datos y mostramos el casino
                    activeTicket = ticketInput;
                    db.ref('codes/' + ticketInput).update({
                        usuario_discord: discordInput,
                        ultimo_login: new Date().toLocaleString("es-ES", { timeZone: "Europe/Madrid" }),
                        online: true
                    });

                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainCasino').style.display = 'flex';
                    document.getElementById('welcomeText').innerText = "BIENVENIDO, " + discordInput.toUpperCase();
                    document.body.style.overflow = 'auto';

                } else {
                    error.innerText = "El ticket no existe en nuestra base de datos.";
                    error.style.display = "block";
                }
            });
        }

        // SEGURIDAD: F12 Y CONTEXT MENU
        document.addEventListener('contextmenu', e => e.preventDefault());

        window.addEventListener('keydown', (e) => {
            const isF12 = e.key === "F12";
            const isInspect = e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i');
            const isViewSource = e.ctrlKey && (e.key === 'u' || e.key === 'U');

            if (isF12 || isInspect || isViewSource) {
                e.preventDefault();
                if (activeTicket) {
                    db.ref('codes/' + activeTicket).update({
                        estado: "baneado",
                        motivo: "Uso de herramientas de desarrollador (F12/Inspect)"
                    }).then(() => window.location.href = 'aviso.html');
                }
            }
        });

        // JUEGOS
        function openGame(url) {
            const modal = document.getElementById('gameModal');
            const iframe = document.getElementById('gameIframe');
            
            // Log de actividad
            db.ref('codes/' + activeTicket + '/actividad').push({
                juego: url,
                hora: new Date().toLocaleString("es-ES", { timeZone: "Europe/Madrid" })
            });

            iframe.src = url + "?code=" + activeTicket;
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameIframe').src = "";
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
