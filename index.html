<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino - Selección de Juego</title>
    <style>
        :root {
            --gold: #bf953f;
            --gold-light: #fcf6ba;
            --dark-bg: #0a0c1a;
            --panel-bg: #15183a;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            background-image: radial-gradient(circle at center, #1e224f 0%, #0a0c1a 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 4rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 50px;
            background: linear-gradient(to bottom, var(--gold-light) 0%, var(--gold) 50%, #aa771c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(191, 149, 63, 0.5));
            text-align: center;
        }

        .lobby {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .game-card {
            background: var(--panel-bg);
            width: 300px;
            height: 400px;
            border-radius: 20px;
            border: 2px solid var(--gold);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .game-card:hover {
            transform: translateY(-15px) scale(1.05);
            box-shadow: 0 0 30px var(--gold);
            border-color: var(--gold-light);
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .game-title {
            color: var(--gold);
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-play {
            margin-top: 30px;
            padding: 10px 30px;
            background: var(--gold);
            color: black;
            border-radius: 50px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .game-card:hover .btn-play {
            background: var(--gold-light);
            box-shadow: 0 0 15px var(--gold-light);
        }

        /* Decoración de fondo */
        .decor {
            position: absolute;
            font-size: 10rem;
            opacity: 0.03;
            z-index: -1;
            user-select: none;
        }
    </style>
</head>
<body>

    <div class="decor" style="top: 10%; left: 10%;">♠</div>
    <div class="decor" style="bottom: 10%; right: 10%;">♦</div>

    <h1>CASINO</h1>

    <div class="lobby">
        <a href="rascaygana.html" class="game-card">
            <div class="icon">🎫</div>
            <div class="game-title">Rasca y Gana</div>
            <div class="btn-play">Jugar Ahora</div>
        </a>

        <a href="ruleta.html" class="game-card">
            <div class="icon">🎡</div>
            <div class="game-title">La Ruleta</div>
            <div class="btn-play">Jugar Ahora</div>
        </a>
    </div>

    <p style="margin-top: 50px; color: rgba(255,255,255,0.4); font-size: 0.9rem;">
        Bienvenido al panel de juego elite v3
    </p>

</body>
</html>
