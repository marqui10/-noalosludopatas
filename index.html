<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>Money Scratch - MegaJackpot Pro</title>
    <style>
        :root {
            --bg: #0f1226;
            --card: #15183a;
            --accent: #7c8cff;
            --text: #e9ecff;
            --win-bg: #19c37d;    /* Verde */
            --opened-bg: #ffd166; /* Amarillo */
            --closed-bg: #ef476f; /* Rojo */
            
            /* Colores Oro Megajackpot */
            --gold-1: #bf953f;
            --gold-2: #fcf6ba;
            --gold-3: #b38728;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            color: var(--text);
            background: radial-gradient(1200px 800px at 10% -10%, #1b1f49 0%, transparent 60%), var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            touch-action: manipulation;
            overflow-x: hidden; /* Para el confeti */
            transition: background 0.5s;
        }

        /* ESTADO DE EMERGENCIA DE ORO (Para todo el body) */
        body.megajackpot-active {
            background: radial-gradient(circle at center, #aa771c 0%, #0f1226 70%), #000 !important;
            animation: bodyShake 0.1s infinite;
        }

        .wrap { width: min(95vw, 500px); z-index: 10; position: relative;}
        .title { text-align: center; margin-bottom: 20px; letter-spacing: 1px; transition: opacity 0.3s; }

        /* SECCIÓN ACCESO */
        #codeGate {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .inputBox { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        input { padding: 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); background: #0b0d22; color: white; text-align: center; font-size: 1rem; }
        button { padding: 14px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; background: var(--accent); color: #0b0d22; }

        /* TABLERO DE JUEGO */
        #gameBoard { display: none; width: 100%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            background: var(--card);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: transform 0.3s;
        }
        .cell {
            position: relative;
            aspect-ratio: 1/1;
            background: #0b0d22;
            border-radius: 12px;
            overflow: hidden;
            display: grid;
            place-items: center;
            border: 2px solid rgba(255,255,255,0.05);
            transition: all 0.4s;
        }

        .symbol { font-size: 1.2rem; font-weight: 800; color: #fff; z-index: 1; text-shadow: 0 1px 3px rgba(0,0,0,0.3); }
        canvas.scratch-layer { position: absolute; inset: 0; cursor: crosshair; touch-action: none; width: 100%; height: 100%; z-index: 5; }

        .status-info { text-align: center; margin-bottom: 15px; font-size: 1.1rem; color: var(--accent); font-weight: bold; transition: opacity 0.3s;}
        
        /* CARTEL DE PREMIO (BANNER) RESEÑADO */
        .prize-banner {
            margin-top: 20px;
            text-align: center;
            padding: 25px;
            background: var(--card);
            border: 2px solid var(--accent);
            border-radius: 15px;
            display: none;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        /* COLORES SEMÁFORO ESTÁNDAR */
        .cell.win-match { background: var(--win-bg) !important; border-color: #fff; transform: scale(1.05); z-index: 2; }
        .cell.opened-no-win { background: var(--opened-bg) !important; border-color: #ff9f1c; }
        .cell.opened-no-win .symbol { color: #000; text-shadow: none; }
        .cell.not-opened { background: var(--closed-bg) !important; border-color: #b91d47; opacity: 0.6; }

        /* ========================================= */
        /* --- MEGAJACKPOT: EXPERIENCIA TOTAL --- */
        /* ========================================= */

        /* 1. Animaciones Base */
        @keyframes goldFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes luxuryShake { 0%, 100% { transform: scale(1.15) rotate(0deg); } 25% { transform: scale(1.15) rotate(2deg); } 75% { transform: scale(1.15) rotate(-2deg); } }
        @keyframes goldGlow { 0%, 100% { box-shadow: 0 0 20px #ffcc00; } 50% { box-shadow: 0 0 50px #ffae00, 0 0 20px #fff; } }
        @keyframes bodyShake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 75% { transform: translate(2px, -2px); } }
        @keyframes flashVictory { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* 2. Estilo de Casilla Ganadora Lujuriosa */
        .cell.megajackpot {
            background: linear-gradient(45deg, var(--gold-1), var(--gold-2), var(--gold-3), var(--gold-2), var(--gold-1)) !important;
            background-size: 400% 400% !important;
            animation: goldFlow 3s ease infinite, luxuryShake 0.1s infinite linear, goldGlow 1s infinite !important;
            border: 4px solid #fff !important;
            z-index: 15;
        }
        .cell.megajackpot .symbol { color: #000 !important; font-size: 1.5rem; text-shadow: 0 0 10px #fff; transform: scale(1.2); }

        /* 3. Banner de Premio Megajackpot */
        .prize-banner.megajackpot-banner {
            background: linear-gradient(135deg, #000 0%, #aa771c 50%, #000 100%) !important;
            border: 5px solid #fff !important;
            animation: goldGlow 1s infiniteflashVictory 0.5s infinite !important;
            box-shadow: 0 0 100px rgba(255, 204, 0, 0.8) !important;
        }
        .prize-banner.megajackpot-banner h2 {
            color: #fff !important;
            font-size: 2.2rem;
            text-transform: uppercase;
            text-shadow: 0 0 20px #ffcc00, 0 0 10px #fff;
            margin: 0 0 15px 0;
        }

        /* 4. Ticket Megajackpot */
        .ticket.megajackpot-ticket {
            background: #000 !important;
            color: #fff !important;
            border: 3px solid #ffcc00 !important;
            border-left: 10px solid #ffcc00 !important;
            animation: flashVictory 0.8s infinite;
        }
        .ticket.megajackpot-ticket .ticket-code { color: #ffcc00 !important; font-size: 1.6rem; }
        .ticket.megajackpot-ticket strong { font-size: 1.8rem; color: #fff; text-shadow: 0 0 10px #ffcc00;}

        /* 5. Confeti Canvas */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 5;
            pointer-events: none;
            display: none;
        }

        /* Resto de estilos */
        .ticket {
            background: #fff; color: #000; padding: 15px; border-radius: 8px; margin-top: 15px;
            border-left: 6px solid var(--win-bg); text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .ticket-code { font-family: monospace; font-size: 1.4rem; font-weight: 800; display: block; color: #d63031; }
        .btn-reset { background: var(--accent); color: #0b0d22; margin-top: 12px; width: 100%; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; border: none; z-index: 20; position: relative;}

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<canvas id="confettiCanvas"></canvas>

<div class="wrap">
    <h2 class="title" id="gameTitle">💰 Money Scratch</h2>

    <div id="codeGate">
        <div class="inputBox">
            <input type="password" id="codeInput" placeholder="Introduce Código">
            <button id="codeBtn">ENTRAR A JUGAR</button>
        </div>
        <p id="codeMsg" style="margin-top:15px; font-size:0.85rem; color: #9aa3c7;"></p>
    </div>

    <div id="gameBoard">
        <div id="adminTag" style="display:none; text-align:center; margin-bottom:10px;">
            <span style="background:var(--win-bg); color:black; padding:2px 10px; border-radius:5px; font-size:0.7rem; font-weight:bold;">MODO DUEÑO</span>
        </div>
        <div class="status-info" id="scratchesLeft">Intentos: 5</div>
        <div class="grid" id="grid"></div>

        <div class="prize-banner" id="resultBanner">
            <h2 id="resultTitle"></h2>
            <div id="ticketContainer"></div>
            <p id="resultDesc" style="font-size: 0.9rem; margin-top: 10px;"></p>
            <button id="nextGameBtn" class="btn-reset" style="display:none;">NUEVA PARTIDA</button>
            <button onclick="location.reload()" style="background:transparent; color:white; margin-top:10px; border:none; cursor:pointer; font-size:0.8rem; opacity:0.5; z-index:20; position:relative;">Cerrar Sesión</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d",
        storageBucket: "rascay-d6d3d.appspot.com",
        messagingSenderId: "991120220829",
        appId: "1:991120220829:web:15c8dfa4677f701e582a74"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const MAX_SCRATCHES = 5;
    const OWNER_PASS = "TINGUI"; 
    let isOwnerSession = false;
    let scratchedIndices = new Set();
    let gameSymbols = [];
    const BASE_POOL = ['5€','10€','20€','50€','100€','200€','500€'];

    document.getElementById('codeBtn').addEventListener('click', async () => {
        const code = document.getElementById('codeInput').value.trim();
        if(code === OWNER_PASS) {
            isOwnerSession = true;
            document.getElementById('adminTag').style.display = 'block';
            setupGame();
        } else {
            const snap = await db.ref('codes/' + code.toUpperCase()).get();
            if(snap.exists()){
                await db.ref('codes/' + code.toUpperCase()).remove();
                setupGame();
            } else {
                document.getElementById('codeMsg').textContent = "Código inválido.";
                document.getElementById('codeMsg').style.color = "#ef476f";
            }
        }
    });

    function setupGame() {
        scratchedIndices.clear();
        document.getElementById('grid').innerHTML = '';
        document.getElementById('ticketContainer').innerHTML = '';
        document.getElementById('resultBanner').style.display = 'none';
        document.getElementById('resultBanner').className = 'prize-banner'; // Reset clases
        document.getElementById('codeGate').style.display = 'none';
        document.getElementById('gameBoard').style.display = 'block';
        document.getElementById('scratchesLeft').textContent = `Intentos: ${MAX_SCRATCHES}`;
        document.getElementById('nextGameBtn').style.display = isOwnerSession ? 'block' : 'none';
        
        // Reset Body y Título
        document.body.className = '';
        document.getElementById('gameTitle').style.opacity = '1';
        document.getElementById('scratchesLeft').style.opacity = '1';

        gameSymbols = [];
        for(let i=0; i<2; i++) gameSymbols.push({val: 'NADA'});
        while(gameSymbols.length < 12) {
            gameSymbols.push({val: BASE_POOL[Math.floor(Math.random() * BASE_POOL.length)]});
        }
        gameSymbols.sort(() => Math.random() - 0.5);

        gameSymbols.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = 'cell';
            div.id = `cell-${i}`;
            div.innerHTML = `<div class="symbol">${s.val}</div><canvas class="scratch-layer" id="canv-${i}"></canvas>`;
            document.getElementById('grid').appendChild(div);
            initScratch(`canv-${i}`, i);
        });
    }

    function initScratch(canvasId, index) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        ctx.fillStyle = '#cfd4db';
        ctx.fillRect(0,0,canvas.width,canvas.height);

        let drawing = false;
        const startAction = () => {
            if(scratchedIndices.size >= MAX_SCRATCHES && !scratchedIndices.has(index)) return;
            drawing = true;
            if(!scratchedIndices.has(index)) {
                scratchedIndices.add(index);
                document.getElementById('scratchesLeft').textContent = `Intentos: ${MAX_SCRATCHES - scratchedIndices.size}`;
            }
        };

        const moveAction = (e) => {
            if(!drawing) return;
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(cx-r.left, cy-r.top, 25, 0, Math.PI * 2); ctx.fill();
            checkThreshold(canvas, ctx, index);
        };

        canvas.addEventListener('mousedown', startAction);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(); });
        window.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mousemove', moveAction);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveAction(e); });
    }

    function checkThreshold(canvas, ctx, index) {
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let cleared = 0;
        for (let i = 3; i < data.length; i += 40) { if (data[i] === 0) cleared++; }
        if (cleared > (data.length / 40) * 0.60) {
            canvas.style.opacity = "0"; canvas.style.pointerEvents = "none";
            if(scratchedIndices.size >= MAX_SCRATCHES) setTimeout(finishGame, 600);
        }
    }

    // --- LÓGICA DE CONFETI (Simple Canvas) ---
    let confettiInterval;
    function startConfetti() {
        const canvas = document.getElementById('confettiCanvas');
        canvas.style.display = 'block';
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let pieces = [];
        const colors = ['#bf953f', '#fcf6ba', '#b38728', '#ffffff'];

        for (let i = 0; i < 150; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                rotation: Math.random() * 360,
                color: colors[Math.floor(Math.random() * colors.length)],
                size: Math.random() * 10 + 5,
                ySpeed: Math.random() * 7 + 3,
                rSpeed: Math.random() * 4 - 2
            });
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.y += p.ySpeed;
                p.rotation += p.rSpeed;
                if (p.y > canvas.height) p.y = -10;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();
            });
            confettiInterval = requestAnimationFrame(update);
        }
        update();
    }

    function stopConfetti() {
        cancelAnimationFrame(confettiInterval);
        document.getElementById('confettiCanvas').style.display = 'none';
    }

    // --- FINAL GAME CON EXPERIENCIA MEGAJACKPOT ---
    async function finishGame() {
        const picked = Array.from(scratchedIndices).map(idx => gameSymbols[idx]);
        const counts = {};
        picked.forEach(s => counts[s.val] = (counts[s.val] || 0) + 1);

        let winVal = null;
        let multiplier = 1;
        let isMega = false;

        for (let v in counts) {
            if (v !== 'NADA') {
                if (counts[v] === 5) { winVal = v; isMega = true; break; }
                else if (counts[v] === 4) { winVal = v; multiplier = 2; break; }
                else if (counts[v] === 3) { winVal = v; multiplier = 1; break; }
            }
        }

        // --- EFECTOS VISUALES DEL TABLERO ---
        if(isMega) {
            document.body.classList.add('megajackpot-active');
            document.getElementById('gameTitle').style.opacity = '0';
            document.getElementById('scratchesLeft').style.opacity = '0';
            startConfetti();
        }

        gameSymbols.forEach((s, i) => {
            const canv = document.getElementById(`canv-${i}`);
            if(canv) canv.style.opacity = "0";
            const cell = document.getElementById(`cell-${i}`);
            
            if (scratchedIndices.has(i)) {
                if (winVal && s.val === winVal) {
                    if (isMega) cell.classList.add('megajackpot');
                    else cell.classList.add('win-match');
                } else cell.classList.add('opened-no-win');
            } else {
                cell.classList.add('not-opened');
                if(isMega) cell.style.transform = 'scale(0.8)'; // Achicar las no rascadas
            }
        });

        // --- MOSTRAR RESULTADO ---
        const banner = document.getElementById('resultBanner');
        banner.style.display = 'block';

        if(winVal) {
            let finalPrize = isMega ? "10.000€" : (parseInt(winVal) * multiplier) + "€";
            const winCode = "WIN-" + Math.random().toString(36).substring(2,9).toUpperCase();
            
            if(isMega) {
                banner.classList.add('megajackpot-banner');
                document.getElementById('resultTitle').innerHTML = "⚡ ¡EL GRAN JACKPOT DE ORO! ⚡";
                document.getElementById('ticketContainer').innerHTML = `
                    <div class="ticket megajackpot-ticket">
                        <small>CÓDIGO LEGENDARIO DE COBRO</small>
                        <span class="ticket-code">${winCode}</span>
                        <strong>PREMIO: ${finalPrize}</strong>
                        <br><br><em style="font-size:0.8rem;">¡HAS CAMBIADO TU VIDA!</em>
                    </div>`;
                document.getElementById('resultDesc').textContent = "HAZ UNA CAPTURA AHORA MISMO. ¡ES LA SUERTE DE TU VIDA!";
            } else {
                document.getElementById('resultTitle').textContent = "¡GANASTE! 🤑";
                document.getElementById('ticketContainer').innerHTML = `
                    <div class="ticket">
                        <small>CÓDIGO GANADOR</small>
                        <span class="ticket-code">${winCode}</span>
                        <strong>VALOR: ${finalPrize}</strong>
                        ${multiplier === 2 ? '<br><small>¡MULTIPLICADOR X2 APLICADO!</small>' : ''}
                    </div>`;
                document.getElementById('resultDesc').textContent = "Haz captura del código para cobrar tu premio.";
            }

            try { await db.ref('prizes/' + winCode).set({ amount: finalPrize, date: new Date().toISOString(), status: "pendiente" }); } catch(e){}
        } else {
            document.getElementById('resultTitle').textContent = "SIN SUERTE";
            if(isMega) stopConfetti(); // Seguridad
        }
    }

    document.getElementById('nextGameBtn').addEventListener('click', () => {
        stopConfetti();
        setupGame();
    });
</script>
</body>
</html>
