<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Mines - VIP Edition</title>
    <style>
        :root {
            --bg-dark: #0f141b;
            --panel-bg: #1a212a;
            --accent-green: #00e676;
            --accent-red: #ff3e3e;
            --gold: #d4af37;
            --tile-bg: #2c3a4a;
            --tile-hover: #3d4f63;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Pantallas de Seguridad */
        #unlockScreen, #banScreen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        #banScreen { background: radial-gradient(circle, #400 0%, #000 100%); display: none; }

        .auth-card {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            text-align: center;
            width: 300px;
        }

        /* Layout Principal */
        #gameArea {
            display: none;
            width: 95%;
            max-width: 1000px;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            padding: 20px;
        }

        /* Panel Lateral Izquierdo */
        .sidebar {
            background: var(--panel-bg);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .stats-box { font-size: 0.9rem; color: #8b9eb5; }
        .balance-val { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; text-transform: uppercase; color: #5f7086; }
        input {
            background: #0d1217;
            border: 1px solid #303f50;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            outline: none;
        }

        .btn-bet {
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-bet:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-cashout { background: var(--gold); display: none; }

        /* Cuadrícula del Juego */
        .grid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 20px;
        }

        .mines-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .tile {
            aspect-ratio: 1;
            background: var(--tile-bg);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 4px solid rgba(0,0,0,0.3);
        }
        .tile:hover { background: var(--tile-hover); transform: translateY(-2px); }
        .tile.revealed { cursor: default; transform: none; background: #1e2835; }
        .tile.gem { background: linear-gradient(135deg, #00e676 0%, #00a052 100%); box-shadow: 0 0 15px rgba(0,230,118,0.4); }
        .tile.bomb { background: linear-gradient(135deg, #ff3e3e 0%, #b32626 100%); }

        .multiplier-info {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-green);
        }

        @media (max-width: 768px) {
            #gameArea { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="auth-card" style="border-color: var(--accent-red);">
        <h1 style="color: var(--accent-red);">BLOQUEADO</h1>
        <p>Tu acceso ha sido revocado.</p>
    </div>
</div>

<div id="unlockScreen">
    <div class="auth-card">
        <h2 style="color: var(--gold);">MINES ACCESS</h2>
        <input type="password" id="keyInput" placeholder="ACCESS KEY" style="width:80%; margin-bottom:10px;">
        <button onclick="tryUnlock()" class="btn-bet" style="width:90%;">CONECTAR</button>
    </div>
</div>

<div id="gameArea">
    <div class="sidebar">
        <div class="stats-box">
            SALDO TOTAL<br>
            <span id="balanceDisplay" class="balance-val">0.00€</span>
        </div>
        
        <div class="input-group">
            <label>Cantidad de apuesta</label>
            <input type="number" id="betInput" value="10.00" min="1">
        </div>

        <div class="input-group">
            <label>Número de Minas</label>
            <input type="number" id="minesInput" value="3" min="1" max="24">
        </div>

        <button id="betBtn" onclick="startGame()" class="btn-bet">Apostar</button>
        <button id="cashoutBtn" onclick="cashout()" class="btn-bet btn-cashout">Retirar</button>
        
        <div id="statusMsg" style="text-align:center; font-size:0.8rem; margin-top:10px;"></div>
    </div>

    <div class="grid-container">
        <h1 style="margin-top:0; letter-spacing: 5px;">MINES</h1>
        <div class="mines-grid" id="minesGrid">
            </div>
        <div class="multiplier-info" id="multDisplay">x1.00</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    let gameActive = false, currentMines = [], revealedTiles = 0;
    let currentBet = 0, currentMultiplier = 1;

    // Inicializar Grid vacío
    function createEmptyGrid() {
        const grid = document.getElementById('minesGrid');
        grid.innerHTML = '';
        for (let i = 0; i < 25; i++) {
            const div = document.createElement('div');
            div.className = 'tile';
            div.onclick = () => revealTile(i);
            grid.appendChild(div);
        }
    }

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'grid';
            createEmptyGrid();
        }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            if (parseFloat(data.saldo) < 0) {
                document.getElementById('gameArea').style.display = 'none';
                document.getElementById('banScreen').style.display = 'flex';
                return;
            }
            isInfinite = data.saldo.toString().includes("@");
            balance = isInfinite ? 999999 : parseFloat(data.saldo);
            document.getElementById('balanceDisplay').innerText = isInfinite ? "∞" : balance.toFixed(2) + "€";
        });
    }

    function startGame() {
        const bet = parseFloat(document.getElementById('betInput').value);
        const minesCount = parseInt(document.getElementById('minesInput').value);

        if (balance < bet && !isInfinite) return alert("Saldo insuficiente");
        
        gameActive = true;
        currentBet = bet;
        revealedTiles = 0;
        currentMultiplier = 1;
        
        // Generar minas
        currentMines = [];
        while(currentMines.length < minesCount) {
            let r = Math.floor(Math.random() * 25);
            if(!currentMines.includes(r)) currentMines.push(r);
        }

        if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance - bet);
        
        createEmptyGrid();
        document.getElementById('betBtn').style.display = 'none';
        document.getElementById('cashoutBtn').style.display = 'block';
        updateMultiplier();
    }

    function revealTile(index) {
        if (!gameActive) return;
        const tiles = document.querySelectorAll('.tile');
        const tile = tiles[index];
        if (tile.classList.contains('revealed')) return;

        tile.classList.add('revealed');

        if (currentMines.includes(index)) {
            // PERDER
            tile.classList.add('bomb');
            tile.innerText = '💣';
            gameOver(false);
        } else {
            // GANAR PASO
            tile.classList.add('gem');
            tile.innerText = '💎';
            revealedTiles++;
            calculateMultiplier();
            updateMultiplier();
        }
    }

    function calculateMultiplier() {
        const total = 25;
        const mines = parseInt(document.getElementById('minesInput').value);
        // Fórmula simplificada de probabilidad
        let prob = 1;
        for(let i=0; i < revealedTiles; i++) {
            prob *= (total - mines - i) / (total - i);
        }
        currentMultiplier = (0.97 / prob); // 0.97 de House Edge
    }

    function updateMultiplier() {
        document.getElementById('multDisplay').innerText = `x${currentMultiplier.toFixed(2)}`;
        document.getElementById('cashoutBtn').innerText = `Retirar ${(currentBet * currentMultiplier).toFixed(2)}€`;
    }

    function cashout() {
        if (!gameActive || revealedTiles === 0) return;
        const winAmount = currentBet * currentMultiplier;
        if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance + winAmount);
        gameOver(true);
    }

    function gameOver(win) {
        gameActive = false;
        const tiles = document.querySelectorAll('.tile');
        
        // Mostrar todas las bombas restantes
        currentMines.forEach(m => {
            tiles[m].classList.add('revealed', 'bomb');
            tiles[m].innerText = '💣';
        });

        document.getElementById('betBtn').style.display = 'block';
        document.getElementById('cashoutBtn').style.display = 'none';
        
        if(!win) {
            document.getElementById('multDisplay').innerText = "¡BOMBA!";
            document.getElementById('multDisplay').style.color = "var(--accent-red)";
        } else {
            document.getElementById('multDisplay').style.color = "var(--accent-green)";
        }
    }
</script>
</body>
</html>
