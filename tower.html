<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TACTICAL HUB PRO - SECURITY SYSTEM</title>
    <style>
        :root {
            --bg: #020406; --gold: #d4af37; --red: #ff3e3e; --green: #00ff88; --card-bg: #0d1117;
            --rarity-0: #4b4b4b; --rarity-4: #e4ae39; --vip: #00e5ff;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; min-height: 100vh; }
        
        /* --- PANTALLAS DE BLOQUEO --- */
        #unlockScreen, #banScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #banScreen { display: none; background: radial-gradient(circle, #300 0%, #000 100%); }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.1); }
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: var(--gold); text-align: center; font-weight: bold; box-sizing: border-box; }

        /* --- NAVEGACIÓN --- */
        nav { display: none; background: #000; border-bottom: 1px solid #1f242c; width: 100%; justify-content: center; gap: 10px; padding: 10px 0; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.05); }

        #mainApp { display: none; max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .header { display: flex; justify-content: space-between; background: var(--card-bg); padding: 20px; border-radius: 12px; border-left: 4px solid var(--gold); margin-bottom: 20px; }

        .game-section { display: none; animation: fadeIn 0.3s ease; }
        .game-section.active { display: flex; flex-direction: column; align-items: center; }

        /* --- BOXES --- */
        .case-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .case-card { background: var(--card-bg); padding: 15px; border-radius: 10px; border: 1px solid #1f242c; text-align: center; cursor: pointer; }
        .case-card.active { border-color: var(--gold); background: #161b22; }
        .roulette-container { position: relative; width: 100%; height: 150px; background: #07090c; border: 2px solid #1f242c; overflow: hidden; border-radius: 8px; margin-bottom: 20px; }
        .strip { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .box-item { min-width: 150px; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 3rem; border-bottom: 4px solid #333; }

        /* --- CRASH --- */
        #crashDisplay { width: 100%; height: 250px; background: #000; border: 1px solid #1f242c; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 5rem; font-weight: 900; color: var(--green); margin-bottom: 20px; text-shadow: 0 0 20px rgba(0,255,136,0.3); }

        /* --- TOWERS --- */
        .tower-grid { display: flex; flex-direction: column-reverse; gap: 8px; margin-bottom: 20px; }
        .tower-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; transition: 0.3s; }
        .tower-cell { height: 45px; width: 80px; background: #161b22; border: 1px solid #30363d; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .btn-main { background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 8px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 1rem; }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="banScreen">
    <h1 style="color: var(--red); font-size: 3rem;">SISTEMA BANEADO</h1>
    <p>Se ha detectado una violación de los términos de seguridad.</p>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">ACCESO TÁCTICO</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="INGRESE CLAVE">
        <button onclick="tryUnlock()" class="btn-main">CONECTAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 10px; font-size: 0.8rem;"></p>
    </div>
</div>

<nav id="navBar">
    <button class="nav-btn active" onclick="switchTab('boxes')">CAJAS</button>
    <button class="nav-btn" onclick="switchTab('crash')">CRASH</button>
    <button class="nav-btn" onclick="switchTab('towers')">TOWERS</button>
</nav>

<main id="mainApp">
    <div class="header">
        <div>
            <div style="font-size: 0.7rem; opacity: 0.5;">BALANCE ACTUAL</div>
            <div id="balanceDisplay" style="font-size: 1.8rem; font-weight: 900; color: var(--gold);">0.00€</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 0.7rem; opacity: 0.5;">ID TERMINAL</div>
            <div id="terminalId" style="font-size: 0.9rem; font-weight: bold; color: #555;">---</div>
        </div>
    </div>

    <section id="tab-boxes" class="game-section active">
        <div class="case-selector">
            <div class="case-card active" onclick="setBoxTier('wood', 10, this)">MADERA<br><span style="color:var(--gold)">10€</span></div>
            <div class="case-card" onclick="setBoxTier('iron', 50, this)">ACERO<br><span style="color:var(--gold)">50€</span></div>
            <div class="case-card" onclick="setBoxTier('gold', 250, this)">ORO<br><span style="color:var(--gold)">250€</span></div>
            <div class="case-card" onclick="setBoxTier('vip', 1000, this)">VIP<br><span style="color:var(--gold)">1000€</span></div>
        </div>
        <div class="roulette-container">
            <div style="position:absolute; left:50%; top:0; bottom:0; width:3px; background:var(--gold); z-index:10; box-shadow: 0 0 15px var(--gold);"></div>
            <div id="boxStrip" class="strip"></div>
        </div>
        <button id="boxBtn" onclick="playBoxes()" class="btn-main">ABRIR SUMINISTRO</button>
    </section>

    <section id="tab-crash" class="game-section">
        <div id="crashDisplay">1.00x</div>
        <div style="width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="number" id="crashBet" value="10" class="key-input" style="margin:0">
            <button id="crashBtn" onclick="playCrash()" class="btn-main" style="background:var(--green)">APOSTAR</button>
        </div>
    </section>

    <section id="tab-towers" class="game-section">
        <div id="towerInfo" style="margin-bottom: 10px; font-weight: bold; color: var(--gold);">Multiplicador: 1.00x</div>
        <div class="tower-grid" id="towerGrid"></div>
        <div style="width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <input type="number" id="towerBet" value="20" class="key-input" style="margin:0">
            <button id="towerBtn" onclick="startTowers()" class="btn-main">JUGAR</button>
            <button id="towerCashout" onclick="cashoutTowers()" class="btn-main" style="display:none; background:var(--green)">COBRAR</button>
        </div>
    </section>
</main>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    // --- CONFIGURACIÓN ---
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let userSaldo = 0, currentKey = "", isInf = false;
    let selectedTier = 'wood', tierPrice = 10;

    // --- SEGURIDAD Y LOGIN ---
    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/' + key).get();
        
        if(snap.exists()) {
            const data = snap.val();
            if(data.saldo === -1) { banUser(); return; }
            
            currentKey = key;
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('navBar').style.display = 'flex';
            document.getElementById('terminalId').innerText = key;
            
            initDatabaseListener();
            renderTowerGrid();
        } else {
            document.getElementById('errorMsg').innerText = "CLAVE INVÁLIDA";
        }
    }

    function initDatabaseListener() {
        db.ref('codes/' + currentKey).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            if(data.saldo === -1) { location.reload(); return; }
            
            isInf = data.saldo.toString().includes("@");
            userSaldo = isInf ? 999999 : parseFloat(data.saldo);
            document.getElementById('balanceDisplay').innerText = isInf ? "INFINITO" : userSaldo.toFixed(2) + "€";
        });
    }

    function banUser() {
        db.ref('codes/' + currentKey + '/saldo').set(-1);
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('navBar').style.display = 'none';
        document.getElementById('banScreen').style.display = 'flex';
    }

    // --- NAVEGACIÓN ---
    function switchTab(tab) {
        document.querySelectorAll('.game-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        event.target.classList.add('active');
        if(tab === 'boxes') buildBoxStrip();
    }

    // --- LÓGICA JUEGO: CAJAS ---
    function setBoxTier(tier, price, el) {
        selectedTier = tier; tierPrice = price;
        document.querySelectorAll('.case-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        buildBoxStrip();
    }

    function buildBoxStrip() {
        const strip = document.getElementById('boxStrip');
        strip.innerHTML = ''; strip.style.transform = 'translateX(0px)';
        const icons = ['🔩', '🔧', '🔫', '🛡️', '💎'];
        for(let i=0; i<80; i++) {
            const item = document.createElement('div');
            item.className = 'box-item';
            item.innerHTML = icons[Math.floor(Math.random()*icons.length)];
            strip.appendChild(item);
        }
    }

    function playBoxes() {
        if(userSaldo < tierPrice && !isInf) return;
        updateSaldo(-tierPrice);
        
        const strip = document.getElementById('boxStrip');
        const btn = document.getElementById('boxBtn');
        btn.disabled = true;
        
        const targetX = -(150 * 65 + Math.random()*100);
        strip.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
        strip.style.transform = `translateX(${targetX}px)`;
        
        setTimeout(() => {
            const win = Math.random() < 0.1 ? tierPrice * 5 : tierPrice * 0.2;
            updateSaldo(win);
            btn.disabled = false;
            buildBoxStrip();
        }, 4500);
    }

    // --- LÓGICA JUEGO: CRASH ---
    let crashActive = false, crashVal = 1.0, crashInt;
    function playCrash() {
        const bet = parseFloat(document.getElementById('crashBet').value);
        const btn = document.getElementById('crashBtn');

        if(!crashActive) {
            if(userSaldo < bet && !isInf) return;
            updateSaldo(-bet);
            crashActive = true; crashVal = 1.0;
            btn.innerText = "COBRAR"; btn.style.background = "var(--gold)";
            
            crashInt = setInterval(() => {
                crashVal += 0.01 + (crashVal * 0.007);
                document.getElementById('crashDisplay').innerText = crashVal.toFixed(2) + "x";
                if(Math.random() < 0.02) { // Crash
                    clearInterval(crashInt);
                    document.getElementById('crashDisplay').innerText = "BOOM!";
                    document.getElementById('crashDisplay').style.color = "var(--red)";
                    crashActive = false;
                    setTimeout(() => {
                        document.getElementById('crashDisplay').style.color = "var(--green)";
                        btn.innerText = "APOSTAR"; btn.style.background = "var(--green)";
                    }, 2000);
                }
            }, 100);
        } else {
            clearInterval(crashInt);
            const win = bet * crashVal;
            updateSaldo(win);
            crashActive = false;
            btn.innerText = "APOSTAR"; btn.style.background = "var(--green)";
        }
    }

    // --- LÓGICA JUEGO: TOWERS ---
    let tLvl = 1, tBet = 0, tActive = false;
    const tMults = [1.0, 1.5, 2.3, 3.8, 6.5, 15.0];

    function renderTowerGrid() {
        const grid = document.getElementById('towerGrid'); grid.innerHTML = '';
        for(let i=1; i<=5; i++) {
            const row = document.createElement('div');
            row.className = 'tower-row'; row.id = 'tr-' + i; row.style.opacity = '0.3';
            for(let j=0; j<3; j++) {
                const cell = document.createElement('div');
                cell.className = 'tower-cell';
                cell.onclick = () => handleTowerClick(i, j);
                row.appendChild(cell);
            }
            grid.appendChild(row);
        }
    }

    function startTowers() {
        tBet = parseFloat(document.getElementById('towerBet').value);
        if(userSaldo < tBet && !isInf) return;
        updateSaldo(-tBet);
        tActive = true; tLvl = 1;
        document.getElementById('towerBtn').style.display = 'none';
        document.getElementById('towerCashout').style.display = 'block';
        renderTowerGrid();
        document.getElementById('tr-1').style.opacity = '1';
    }

    function handleTowerClick(row, col) {
        if(!tActive || row !== tLvl) return;
        const mine = Math.floor(Math.random()*3);
        const cells = document.querySelectorAll(`#tr-${row} .tower-cell`);
        
        if(col !== mine) {
            cells[col].innerHTML = '✅'; cells[col].style.borderColor = "var(--green)";
            document.getElementById('towerInfo').innerText = `Multiplicador: ${tMults[tLvl]}x`;
            if(tLvl === 5) { cashoutTowers(); }
            else { tLvl++; document.getElementById('tr-'+tLvl).style.opacity = '1'; }
        } else {
            cells[col].innerHTML = '💥'; cells[col].style.borderColor = "var(--red)";
            tActive = false;
            setTimeout(() => { alert("¡PERDISTE!"); resetTowers(); }, 500);
        }
    }

    function cashoutTowers() {
        const win = tBet * tMults[tLvl-1];
        updateSaldo(win);
        alert("COBRASTE: " + win.toFixed(2) + "€");
        resetTowers();
    }

    function resetTowers() {
        tActive = false;
        document.getElementById('towerBtn').style.display = 'block';
        document.getElementById('towerCashout').style.display = 'none';
        document.getElementById('towerInfo').innerText = "Multiplicador: 1.00x";
        renderTowerGrid();
    }

    // --- FUNCIÓN CENTRAL DE SALDO ---
    function updateSaldo(amount) {
        if(isInf) return;
        const nuevoSaldo = parseFloat((userSaldo + amount).toFixed(2));
        
        // AUTO-BAN SI SE DETECTA HACK DE SALDO (Saldo negativo o inconsistente)
        if(nuevoSaldo < 0 && !isInf) { banUser(); return; }
        
        db.ref('codes/' + currentKey + '/saldo').set(nuevoSaldo);
    }

    // Inicializar visuales
    buildBoxStrip();
</script>
</body>
</html>
