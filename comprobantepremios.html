<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel de Control - Verificación</title>
<style>
:root{
  --bg:#0b0d17; --card:#1a1d2e; --accent:#7c8cff; --text:#f0f2f5;
  --win:#19c37d; --loss:#ff4757; --pending:#ffd700;
}
body{
  margin:0; font-family: 'Segoe UI', sans-serif;
  color:var(--text); background: var(--bg);
  display:flex; flex-direction:column; align-items:center; min-height:100vh; padding: 20px;
}
.wrap{ width:min(95vw, 600px); }
.header { text-align: center; margin-bottom: 30px; }

/* Buscador */
.search-box {
  background: var(--card); padding: 25px; border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
}
input {
  width: 100%; padding: 15px; border-radius: 8px; border: 1px solid #2a2f45;
  background: #070912; color: white; font-size: 1.2rem; text-align: center;
  margin-bottom: 15px; text-transform: uppercase;
}
button {
  padding: 12px 25px; border-radius: 8px; border: none; font-weight: bold;
  cursor: pointer; transition: 0.3s; width: 100%;
}
.btn-search { background: var(--accent); color: #0b0d22; font-size: 1rem; }

/* Resultado */
#resultArea { margin-top: 20px; display: none; }
.prize-card {
  background: white; color: #1a1d2e; padding: 20px; border-radius: 12px;
  text-align: center; position: relative;
}
.prize-val { font-size: 2.5rem; font-weight: 800; display: block; margin: 10px 0; color: #1a1d2e; }
.status-badge {
  display: inline-block; padding: 5px 12px; border-radius: 20px;
  font-size: 0.8rem; font-weight: bold; margin-bottom: 15px;
}
.status-pending { background: var(--pending); color: #000; }

/* Botones de acción */
.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
.btn-wait { background: #555; color: white; }
.btn-paid { background: var(--win); color: white; }
.btn-wait.active { background: var(--pending); color: black; border: 2px solid black; }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>📋 Verificador de Premios</h1>
    <p style="color:var(--muted)">Introduce el código del comprobante para cobrarlo</p>
  </div>

  <div class="search-box">
    <input type="text" id="ticketInput" placeholder="EJ: WIN-A1B2C3D">
    <button class="btn-search" id="searchBtn">BUSCAR COMPROBANTE</button>
  </div>

  <div id="resultArea">
    <div class="prize-card">
        <span id="statusLabel" class="status-badge"></span>
        <small style="color:#666; display:block;">PREMIO A ENTREGAR:</small>
        <span id="prizeAmount" class="prize-val">0€</span>
        <p id="ticketDate" style="font-size:0.8rem; color:#888;"></p>

        <div class="actions">
            <button id="waitBtn" class="btn-wait">EN ESPERA</button>
            <button id="paidBtn" class="btn-paid">COBRADO (Borrar)</button>
        </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
  authDomain: "rascay-d6d3d.firebaseapp.com",
  databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rascay-d6d3d",
  storageBucket: "rascay-d6d3d.appspot.com",
  messagingSenderId: "991120220829",
  appId: "1:991120220829:web:15c8dfa4677f701e582a74"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentTicket = null;

// 1. BUSCAR CÓDIGO
document.getElementById('searchBtn').addEventListener('click', async () => {
    const code = document.getElementById('ticketInput').value.trim().toUpperCase();
    if(!code) return;

    const snapshot = await db.ref('prizes/' + code).get();
    
    if(snapshot.exists()) {
        const data = snapshot.val();
        currentTicket = code;
        
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('prizeAmount').textContent = data.amount;
        document.getElementById('ticketDate').textContent = "Generado el: " + data.date;
        
        const label = document.getElementById('statusLabel');
        const waitBtn = document.getElementById('waitBtn');
        
        if(data.status === "waiting") {
            label.textContent = "ESPERANDO EN MOSTRADOR";
            label.className = "status-badge status-pending";
            waitBtn.classList.add('active');
            waitBtn.textContent = "MARCADO COMO ESPERA";
        } else {
            label.textContent = "PENDIENTE DE COBRO";
            label.className = "status-badge";
            label.style.background = "#eee";
            waitBtn.classList.remove('active');
            waitBtn.textContent = "PONER EN ESPERA";
        }
    } else {
        alert("El código no existe o ya fue cobrado.");
        document.getElementById('resultArea').style.display = 'none';
    }
});

// 2. BOTÓN EN ESPERA (Actualiza estado en DB)
document.getElementById('waitBtn').addEventListener('click', async () => {
    if(!currentTicket) return;
    
    await db.ref('prizes/' + currentTicket).update({
        status: "waiting"
    });
    
    alert("Código marcado 'En Espera'.");
    document.getElementById('searchBtn').click(); // Refrescar vista
});

// 3. BOTÓN COBRADO (Borra de la DB)
document.getElementById('paidBtn').addEventListener('click', async () => {
    if(!currentTicket) return;
    
    if(confirm("¿Confirmas que el premio ha sido entregado? El código se borrará permanentemente.")) {
        await db.ref('prizes/' + currentTicket).remove();
        alert("Premio registrado como cobrado. Código eliminado.");
        document.getElementById('resultArea').style.display = 'none';
        document.getElementById('ticketInput').value = '';
    }
});
</script>
</body>
</html>
