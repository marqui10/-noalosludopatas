<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Loot - Batch Mode</title>
    <style>
        :root {
            --bg: #030508;
            --gold: #d4af37;
            --red: #ff3e3e;
            --green: #00ff88;
            --card-bg: #0d1117;
            --rarity-0: #4b4b4b; --rarity-1: #4b69ff; --rarity-2: #8847ff; --rarity-3: #eb4b4b; --rarity-4: #e4ae39;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* --- SEGURIDAD --- */
        #unlockScreen, #banScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #banScreen { display: none; background: radial-gradient(circle, #200 0%, #000 100%); }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #000; color: var(--gold); text-align: center; font-weight: bold; }

        /* --- LAYOUT --- */
        #gameArea { display: none; width: 100%; max-width: 1000px; padding: 20px; flex-direction: column; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card-bg); padding: 15px; border-radius: 10px; border-bottom: 2px solid var(--gold); }
        
        /* --- RULETA --- */
        .roulette-container { position: relative; width: 100%; height: 180px; background: #07090c; border: 2px solid #1f242c; overflow: hidden; border-radius: 5px; }
        .selector-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--gold); z-index: 10; box-shadow: 0 0 15px var(--gold); transform: translateX(-50%); }
        .item-strip { display: flex; position: absolute; left: 0; top: 15px; will-change: transform; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        
        .item-box { min-width: 150px; height: 150px; margin: 0 5px; background: #11141a; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 4px solid transparent; }
        .item-box span { font-size: 3rem; }

        /* --- CONTROLES Y AUTO-OPEN --- */
        .main-controls { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; margin: 20px 0; }
        .control-panel { background: var(--card-bg); padding: 20px; border-radius: 10px; border: 1px solid #1f242c; display: flex; flex-direction: column; justify-content: center; }
        
        .btn-main { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn-auto { background: #1a1f26; color: var(--gold); border: 1px solid var(--gold); margin-top: 10px; }
        .btn-auto.active { background: var(--red); color: #fff; border-color: var(--red); }
        
        .input-row { display: flex; gap: 10px; margin-top: 10px; align-items: center; }
        .input-row label { font-size: 0.7rem; opacity: 0.6; width: 80px; }
        input.auto-input { background: #000; border: 1px solid #333; color: var(--green); padding: 8px; flex-grow: 1; text-align: center; border-radius: 5px; font-weight: bold; }

        /* --- INVENTARIO Y TABLA LADO A LADO --- */
        .inventory-wrapper { display: flex; gap: 20px; margin-top: 20px; }
        .inventory-section { background: var(--card-bg); padding: 20px; border-radius: 10px; flex: 2; }
        .table-section { background: var(--card-bg); padding: 20px; border-radius: 10px; flex: 1; min-width: 200px; }
        
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; max-height: 150px; overflow-y: auto; }
        .inv-slot { aspect-ratio: 1; background: #05070a; border: 1px solid #1f242c; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }

        .loot-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: left; }
        .loot-table th { color: var(--gold); border-bottom: 1px solid #333; padding-bottom: 5px; }
        .loot-table td { padding: 5px 0; border-bottom: 1px solid #1f242c; }

        #winModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: #fff; color: #000; padding: 40px; border-radius: 15px; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; text-align: center; }
        #winModal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div id="banScreen">
    <h1 style="color: var(--red);">SISTEMA BLOQUEADO</h1>
    <p id="banReasonText">Inconsistencia crítica en la cuenta</p>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">TERMINAL ACCESO</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="ACCESS KEY">
        <button onclick="tryUnlock()" class="btn-main">CONECTAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 15px; font-size: 0.8rem;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="header">
        <div>SALDO: <span id="balanceDisplay" style="color: var(--gold); font-weight: bold;">0.00€</span></div>
        <div id="statusTag" style="font-size: 0.7rem;">CAJAS RESTANTES: <span id="autoCountDisplay" style="color:var(--gold)">0</span></div>
    </div>

    <div class="roulette-container">
        <div class="selector-line"></div>
        <div class="item-strip" id="itemStrip"></div>
    </div>

    <div class="main-controls">
        <div class="control-panel">
            <div style="font-size: 0.8rem; opacity: 0.6; text-align: center;">MODO MANUAL (25€)</div>
            <button id="openBtn" onclick="startCase()" class="btn-main" style="margin-top:15px">ABRIR 1</button>
        </div>
        
        <div class="control-panel">
            <div class="input-row">
                <label>Nº CAJAS:</label>
                <input type="number" id="boxLimit" class="auto-input" value="10" min="1">
            </div>
            <div class="input-row">
                <label>STOP SALDO:</label>
                <input type="number" id="stopLimit" class="auto-input" placeholder="0.00" value="0">
            </div>
            <button id="autoBtn" onclick="toggleAuto()" class="btn-main btn-auto">EJECUTAR BATCH</button>
        </div>
    </div>

    <div class="inventory-wrapper">
        <div class="inventory-section">
            <div style="font-size: 0.8rem; margin-bottom: 10px; opacity: 0.5;">RECOLECTADO</div>
            <div class="inv-grid" id="invGrid"></div>
        </div>

        <div class="table-section">
            <div style="font-size: 0.7rem; margin-bottom: 10px; opacity: 0.5;">PREMIOS</div>
            <table class="loot-table">
                <thead>
                    <tr>
                        <th>ÍTEM</th>
                        <th>VALOR</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td style="color:var(--rarity-0)">🔩 Tornillo</td><td>x0.01</td></tr>
                    <tr><td style="color:var(--rarity-0)">🔋 Pila</td><td>x0.1</td></tr>
                    <tr><td style="color:var(--rarity-1)">🔪 Navaja</td><td>x0.8</td></tr>
                    <tr><td style="color:var(--rarity-2)">🔫 Glock-18</td><td>x2.5</td></tr>
                    <tr><td style="color:var(--rarity-3)">🛡️ Kevlar</td><td>x5.0</td></tr>
                    <tr><td style="color:var(--rarity-4)">💎 Zafiro</td><td>x30.0</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="winModal">
    <div id="winRarity" style="font-size: 0.7rem; font-weight: bold;">RARITY</div>
    <div id="winIcon" style="font-size: 4rem; margin: 10px 0;">📦</div>
    <div id="winName" style="font-weight: 900;">OBJETO</div>
    <div id="winValue" style="color: #188a53; font-weight: bold;">+0.00€</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    let isAutoMode = false;
    let boxesLeft = 0;
    const caseCost = 25.00;
    const itemWidth = 160;

    const lootTable = [
        { icon: '🔩', name: 'Tornillo', mult: 0.01, rarity: 'BASURA', color: 'var(--rarity-0)' },
        { icon: '🔋', name: 'Pila', mult: 0.1, rarity: 'BASURA', color: 'var(--rarity-0)' },
        { icon: '🔪', name: 'Navaja', mult: 0.8, rarity: 'COMÚN', color: 'var(--rarity-1)' },
        { icon: '🔫', name: 'Glock-18', mult: 2.5, rarity: 'RARO', color: 'var(--rarity-2)' },
        { icon: '🛡️', name: 'Kevlar', mult: 5.0, rarity: 'ÉPICO', color: 'var(--rarity-3)' },
        { icon: '💎', name: 'Zafiro', mult: 30.0, rarity: 'RELIQUIA', color: 'var(--rarity-4)' }
    ];

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            const data = snap.val();
            if(data.saldo === -1) { showBan(data.motivoBan); return; }
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            buildStrip();
        } else { document.getElementById('errorMsg').innerText = "CLAVE ERRÓNEA"; }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            const data = snap.val();
            if(!data || data.saldo === -1) { showBan(data?.motivoBan); return; }
            isInfinite = data.saldo.toString().includes("@");
            balance = isInfinite ? 999999 : parseFloat(data.saldo);
            document.getElementById('balanceDisplay').innerText = isInfinite ? "∞" : balance.toFixed(2) + "€";
        });
    }

    function showBan(m) {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('banScreen').style.display = 'flex';
        document.getElementById('banReasonText').innerText = m || "Infracción detectada";
    }

    function getWeightedItem() {
        let r = Math.random();
        if (r < 0.003) return lootTable[5]; // 0.3%
        if (r < 0.02) return lootTable[4];  // 1.7%
        if (r < 0.08) return lootTable[3];  // 6%
        if (r < 0.25) return lootTable[2];  // 17%
        return lootTable[Math.floor(Math.random()*2)]; 
    }

    function buildStrip() {
        const strip = document.getElementById('itemStrip');
        strip.innerHTML = '';
        for(let i = 0; i < 100; i++) {
            const item = getWeightedItem();
            const div = document.createElement('div');
            div.className = 'item-box';
            div.style.borderBottomColor = item.color;
            div.innerHTML = `<span>${item.icon}</span>`;
            div.dataset.itemData = JSON.stringify(item);
            strip.appendChild(div);
        }
    }

    function toggleAuto() {
        if(!isAutoMode) {
            boxesLeft = parseInt(document.getElementById('boxLimit').value) || 0;
            if(boxesLeft <= 0) return;
            isAutoMode = true;
            document.getElementById('autoBtn').innerText = "CANCELAR";
            document.getElementById('autoBtn').classList.add('active');
            document.getElementById('autoCountDisplay').innerText = boxesLeft;
            startCase();
        } else {
            isAutoMode = false;
            boxesLeft = 0;
            document.getElementById('autoBtn').innerText = "EJECUTAR BATCH";
            document.getElementById('autoBtn').classList.remove('active');
            document.getElementById('autoCountDisplay').innerText = "0";
        }
    }

    function startCase() {
        if(balance < caseCost && !isInfinite) {
            if(isAutoMode) toggleAuto();
            return;
        }

        const stopAt = parseFloat(document.getElementById('stopLimit').value);
        if(!isNaN(stopAt) && balance <= stopAt && isAutoMode) {
            toggleAuto();
            return;
        }

        const openBtn = document.getElementById('openBtn');
        openBtn.disabled = true;
        
        if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance - caseCost);
        
        buildStrip();
        const strip = document.getElementById('itemStrip');
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0px)';
        void strip.offsetWidth;

        const targetIndex = 85 + Math.floor(Math.random() * 8);
        const randomOffset = Math.floor(Math.random() * 80) - 40;
        const finalX = -(targetIndex * itemWidth) + (document.querySelector('.roulette-container').offsetWidth / 2) - (itemWidth / 2) + randomOffset;

        strip.style.transition = `transform ${isAutoMode ? '1.5s' : '4s'} cubic-bezier(0.1, 0, 0.1, 1)`;
        strip.style.transform = `translateX(${finalX}px)`;

        setTimeout(() => {
            const winner = JSON.parse(strip.children[targetIndex].dataset.itemData);
            const winAmount = caseCost * winner.mult;
            
            if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance + winAmount);
            
            if(!isAutoMode) showWin(winner, winAmount);
            addToInventory(winner.icon);

            setTimeout(() => {
                openBtn.disabled = false;
                if(isAutoMode) {
                    boxesLeft--;
                    document.getElementById('autoCountDisplay').innerText = boxesLeft;
                    if(boxesLeft > 0) {
                        startCase();
                    } else {
                        toggleAuto();
                    }
                }
            }, isAutoMode ? 400 : 2000);
        }, isAutoMode ? 1600 : 4100);
    }

    function addToInventory(icon) {
        const grid = document.getElementById('invGrid');
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.innerText = icon;
        grid.prepend(slot);
        if(grid.children.length > 50) grid.lastChild.remove();
    }

    function showWin(item, amount) {
        const modal = document.getElementById('winModal');
        document.getElementById('winRarity').innerText = item.rarity;
        document.getElementById('winRarity').style.color = item.color;
        document.getElementById('winIcon').innerText = item.icon;
        document.getElementById('winName').innerText = item.name;
        document.getElementById('winValue').innerText = `+${amount.toFixed(2)}€`;
        modal.classList.add('active');
        setTimeout(() => modal.classList.remove('active'), 2000);
    }
</script>
</body>
</html>
