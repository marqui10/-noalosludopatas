<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Loot - VIP Edition</title>
    <style>
        :root {
            --bg: #030508; --gold: #d4af37; --red: #ff3e3e; --green: #00ff88; --card-bg: #0d1117;
            --rarity-0: #4b4b4b; --rarity-1: #4b69ff; --rarity-2: #8847ff; --rarity-3: #eb4b4b; --rarity-4: #e4ae39;
            --vip: #00e5ff;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        #unlockScreen, #gameArea { width: 100%; display: flex; flex-direction: column; align-items: center; }
        #unlockScreen { position: fixed; inset: 0; background: var(--bg); justify-content: center; z-index: 9999; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        input.key-input, input.auto-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: var(--gold); text-align: center; font-weight: bold; }

        #gameArea { display: none; max-width: 1100px; padding: 20px; box-sizing: border-box; }
        .header { width: 100%; display: flex; justify-content: space-between; background: var(--card-bg); padding: 15px; border-radius: 10px; border-bottom: 2px solid var(--gold); margin-bottom: 20px; box-sizing: border-box;}

        /* SELECCIÓN DE CAJAS */
        .case-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; margin-bottom: 20px; }
        .case-card { background: var(--card-bg); padding: 12px; border-radius: 10px; border: 1px solid #1f242c; text-align: center; cursor: pointer; transition: 0.2s; }
        .case-card.active { border-color: var(--gold); background: #161b22; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .case-card.vip-card.active { border-color: var(--vip); box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        .case-price { color: var(--gold); font-weight: 900; font-size: 1.1rem; }
        .vip-price { color: var(--vip) !important; }

        /* RULETA */
        .roulette-container { position: relative; width: 100%; height: 160px; background: #07090c; border: 2px solid #1f242c; overflow: hidden; border-radius: 5px; margin-bottom: 20px; }
        .selector-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--gold); z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px var(--gold); }
        .item-strip { display: flex; position: absolute; left: 0; top: 5px; will-change: transform; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .item-box { min-width: 150px; height: 150px; margin: 0 5px; background: #11141a; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid transparent; font-size: 3rem; }

        /* CONTROLES AUTOMÁTICO */
        .main-controls { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; width: 100%; margin-bottom: 20px; }
        .control-panel { background: var(--card-bg); padding: 20px; border-radius: 10px; border: 1px solid #1f242c; }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 5px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; }
        .btn-auto { background: #1a1f26; color: var(--gold); border: 1px solid var(--gold); margin-top: 10px; }
        .btn-auto.active { background: var(--red); color: #fff; border-color: var(--red); }

        .inventory-wrapper { display: flex; gap: 20px; width: 100%; }
        .inventory-section { background: var(--card-bg); padding: 20px; border-radius: 10px; flex: 1.5; }
        .table-section { background: var(--card-bg); padding: 20px; border-radius: 10px; flex: 1; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 5px; max-height: 200px; overflow-y: auto; }
        .inv-slot { aspect-ratio: 1; background: #05070a; border: 1px solid #1f242c; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .loot-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .loot-table td { padding: 8px 0; border-bottom: 1px solid #1f242c; }

        #winModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5); background: #fff; color: #000; padding: 30px; border-radius: 15px; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; text-align: center; }
        #winModal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">SISTEMA DE SUMINISTROS</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="ACCESS KEY">
        <button onclick="tryUnlock()" class="btn-main">CONECTAR</button>
    </div>
</div>

<div id="gameArea">
    <div class="header">
        <div>SALDO: <span id="balanceDisplay" style="color: var(--gold);">0.00€</span></div>
        <div>RESTANTES: <span id="autoCountDisplay" style="color:var(--gold)">0</span></div>
    </div>

    <div class="case-selector">
        <div class="case-card active" id="case-wood" onclick="selectCase('wood')">
            <div style="font-size:0.6rem; opacity:0.5">MADERA</div>
            <div class="case-price">10€</div>
        </div>
        <div class="case-card" id="case-iron" onclick="selectCase('iron')">
            <div style="font-size:0.6rem; opacity:0.5">ACERO</div>
            <div class="case-price">50€</div>
        </div>
        <div class="case-card" id="case-gold" onclick="selectCase('gold')">
            <div style="font-size:0.6rem; opacity:0.5">ORO</div>
            <div class="case-price">250€</div>
        </div>
        <div class="case-card vip-card" id="case-vip" onclick="selectCase('vip')">
            <div style="font-size:0.6rem; color:var(--vip)">VIP PLATINUM</div>
            <div class="case-price vip-price">10000€</div>
        </div>
    </div>

    <div class="roulette-container">
        <div class="selector-line"></div>
        <div class="item-strip" id="itemStrip"></div>
    </div>

    <div class="main-controls">
        <div class="control-panel">
            <button id="openBtn" onclick="startCase()" class="btn-main">ABRIR 1</button>
        </div>
        <div class="control-panel">
            <div style="display:flex; gap:10px; align-items:center">
                <label style="font-size:0.7rem; opacity:0.5">CANTIDAD:</label>
                <input type="number" id="boxLimit" class="auto-input" value="10" min="1" style="margin:0; flex:1">
            </div>
            <button id="autoBtn" onclick="toggleAuto()" class="btn-main btn-auto">EJECUTAR BATCH</button>
        </div>
    </div>

    <div class="inventory-wrapper">
        <div class="inventory-section">
            <div style="font-size:0.7rem; margin-bottom:10px; opacity:0.5">ÚLTIMOS HALLAZGOS</div>
            <div class="inv-grid" id="invGrid"></div>
        </div>
        <div class="table-section">
            <div id="tableTitle" style="font-size:0.7rem; margin-bottom:10px; opacity:0.5">PREMIOS</div>
            <table class="loot-table"><tbody id="lootTableBody"></tbody></table>
        </div>
    </div>
</div>

<div id="winModal">
    <div id="winRarity" style="font-size: 0.7rem; font-weight: bold;">WINNER</div>
    <div id="winIcon" style="font-size: 4rem;">📦</div>
    <div id="winName" style="font-weight: 900;">OBJETO</div>
    <div id="winValue" style="color: #188a53; font-weight: bold;">+0.00€</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false, isAutoMode = false, boxesLeft = 0;
    let selectedTier = 'wood';
    const itemWidth = 160;

    const itemsByTier = {
        wood: [
            { icon: '🔩', name: 'Tornillo', mult: 0.01, color: 'var(--rarity-0)' },
            { icon: '🔋', name: 'Pila', mult: 0.1, color: 'var(--rarity-0)' },
            { icon: '🔪', name: 'Navaja', mult: 1.2, color: 'var(--rarity-1)' },
            { icon: '🔫', name: 'Glock-18', mult: 2.5, color: 'var(--rarity-2)' },
            { icon: '🛡️', name: 'Kevlar', mult: 5.0, color: 'var(--rarity-3)' },
            { icon: '💎', name: 'Zafiro', mult: 30.0, color: 'var(--rarity-4)' }
        ],
        iron: [
            { icon: '🧱', name: 'Ladrillo', mult: 0.01, color: 'var(--rarity-0)' },
            { icon: '🔌', name: 'Cable', mult: 0.1, color: 'var(--rarity-0)' },
            { icon: '⚔️', name: 'Espada', mult: 1.2, color: 'var(--rarity-1)' },
            { icon: '🧨', name: 'C4', mult: 2.5, color: 'var(--rarity-2)' },
            { icon: '🧥', name: 'Chaleco Pesado', mult: 5.0, color: 'var(--rarity-3)' },
            { icon: '👑', name: 'Corona', mult: 30.0, color: 'var(--rarity-4)' }
        ],
        gold: [
            { icon: '💩', name: 'Chatarra Dorada', mult: 0.01, color: 'var(--rarity-0)' },
            { icon: '📱', name: 'Smartphone', mult: 0.1, color: 'var(--rarity-0)' },
            { icon: '🔱', name: 'Tridente', mult: 1.2, color: 'var(--rarity-1)' },
            { icon: '🚀', name: 'Misil', mult: 2.5, color: 'var(--rarity-2)' },
            { icon: '🛸', name: 'Escudo UAP', mult: 5.0, color: 'var(--rarity-3)' },
            { icon: '💰', name: 'Saco de Oro', mult: 30.0, color: 'var(--rarity-4)' }
        ],
        vip: [
            { icon: '👟', name: 'Nike Air Force 1', mult: 0.01, color: 'var(--rarity-0)' },
            { icon: '🎧', name: 'Airpods Pro', mult: 0.02, color: 'var(--rarity-0)' },
            { icon: '💻', name: 'ASUS ROG Ally X', mult: 0.1, color: 'var(--rarity-0)' },
            { icon: '📱', name: 'Iphone 17', mult: 0.2, color: 'var(--rarity-0)' },
            { icon: '⌚', name: 'Rolex Submarine', mult: 1.1, color: 'var(--rarity-1)' },
            { icon: '🛵', name: 'Vespa Elettrica', mult: 1.2, color: 'var(--rarity-1)' },
            { icon: '🏍️', name: 'Ducati Panigale V4', mult: 2.3, color: 'var(--rarity-2)' },
            { icon: '🎹', name: 'Piano de Cola', mult: 2.5, color: 'var(--rarity-2)' },
            { icon: '👜', name: 'Bolso Hermès Birkin', mult: 4.8, color: 'var(--rarity-3)' },
            { icon: '🚘', name: 'BMW Serie 4 Coupé', mult: 5.0, color: 'var(--rarity-3)' },
            { icon: '⛵', name: 'Yate', mult: 30.0, color: 'var(--rarity-4)' }, 
            { icon: '🏎️', name: 'Porsche 911 GT3 RS', mult: 32.0, color: 'var(--rarity-4)' }
        ]
    };

    const prices = { wood: 10, iron: 50, gold: 250, vip: 10000 };

    function renderTable() {
        const body = document.getElementById('lootTableBody');
        const list = itemsByTier[selectedTier];
        const currentPrice = prices[selectedTier];
        body.innerHTML = list.map(item => `
            <tr>
                <td style="color:${item.color}">${item.icon} ${item.name}</td>
                <td style="text-align:right; font-weight:bold">${(currentPrice * item.mult).toFixed(2)}€</td>
            </tr>
        `).join('');
    }

    function selectCase(tier) {
        if(isAutoMode || document.getElementById('openBtn').disabled) return;
        selectedTier = tier;
        document.querySelectorAll('.case-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`case-${tier}`).classList.add('active');
        renderTable();
        buildStrip();
    }

    function getWeightedItem() {
        let r = Math.random();
        const list = itemsByTier[selectedTier];
        if (r < 0.003) return list[5]; 
        if (r < 0.02) return list[4];  
        if (r < 0.08) return list[3];  
        if (r < 0.25) return list[2];  
        return list[Math.floor(Math.random()*2)]; 
    }

    function buildStrip() {
        const strip = document.getElementById('itemStrip');
        strip.innerHTML = '';
        for(let i = 0; i < 100; i++) {
            const item = getWeightedItem();
            const div = document.createElement('div');
            div.className = 'item-box';
            div.style.borderBottomColor = item.color;
            div.innerHTML = `<span>${item.icon}</span>`;
            div.dataset.itemData = JSON.stringify(item);
            strip.appendChild(div);
        }
    }

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            renderTable(); buildStrip();
        }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            isInfinite = data.saldo.toString().includes("@");
            balance = isInfinite ? 999999 : parseFloat(data.saldo);
            document.getElementById('balanceDisplay').innerText = isInfinite ? "∞" : balance.toFixed(2) + "€";
        });
    }

    function startCase() {
        const price = prices[selectedTier];
        if(balance < price && !isInfinite) { if(isAutoMode) toggleAuto(); return; }
        const openBtn = document.getElementById('openBtn');
        openBtn.disabled = true;
        if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance - price);
        buildStrip();
        const strip = document.getElementById('itemStrip');
        strip.style.transition = 'none'; strip.style.transform = 'translateX(0px)';
        void strip.offsetWidth;
        const targetIndex = 88;
        const finalX = -(targetIndex * 160) + (document.querySelector('.roulette-container').offsetWidth / 2) - 80;
        strip.style.transition = `transform ${isAutoMode ? '1s' : '4s'} cubic-bezier(0.1, 0, 0.1, 1)`;
        strip.style.transform = `translateX(${finalX}px)`;
        setTimeout(() => {
            const winner = JSON.parse(strip.children[targetIndex].dataset.itemData);
            const winAmount = price * winner.mult;
            if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance + winAmount);
            if(!isAutoMode) showWin(winner, winAmount);
            addToInventory(winner.icon);
            setTimeout(() => {
                openBtn.disabled = false;
                if(isAutoMode) {
                    boxesLeft--; document.getElementById('autoCountDisplay').innerText = boxesLeft;
                    if(boxesLeft > 0) startCase(); else toggleAuto();
                }
            }, isAutoMode ? 150 : 1500);
        }, isAutoMode ? 1100 : 4100);
    }

    function toggleAuto() {
        if(!isAutoMode) {
            boxesLeft = parseInt(document.getElementById('boxLimit').value) || 0;
            if(boxesLeft <= 0) return;
            isAutoMode = true;
            document.getElementById('autoBtn').innerText = "CANCELAR BATCH";
            document.getElementById('autoBtn').classList.add('active');
            document.getElementById('autoCountDisplay').innerText = boxesLeft;
            startCase();
        } else {
            isAutoMode = false;
            boxesLeft = 0;
            document.getElementById('autoBtn').innerText = "EJECUTAR BATCH";
            document.getElementById('autoBtn').classList.remove('active');
            document.getElementById('autoCountDisplay').innerText = "0";
        }
    }

    function addToInventory(icon) {
        const grid = document.getElementById('invGrid');
        const slot = document.createElement('div');
        slot.className = 'inv-slot'; slot.innerText = icon;
        grid.prepend(slot);
        if(grid.children.length > 50) grid.lastChild.remove();
    }

    function showWin(item, amount) {
        const modal = document.getElementById('winModal');
        document.getElementById('winIcon').innerText = item.icon;
        document.getElementById('winName').innerText = item.name;
        document.getElementById('winValue').innerText = `+${amount.toFixed(2)}€`;
        modal.classList.add('active');
        setTimeout(() => modal.classList.remove('active'), 2000);
    }
</script>
</body>
</html>
