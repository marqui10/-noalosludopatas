<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS:GO Style Case Opening</title>
    <style>
        :root {
            --bg: #05070a;
            --gold: #d4af37;
            --card-bg: #0d1117;
            --rarity-common: #4b69ff;
            --rarity-rare: #8847ff;
            --rarity-legend: #eb4b4b;
            --rarity-gold: #e4ae39;
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* --- HEADER --- */
        .header { width: 100%; max-width: 900px; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        #balance { color: var(--gold); font-weight: 900; font-size: 1.5rem; text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        /* --- CONTENEDOR RULETA --- */
        .roulette-wrapper {
            position: relative; width: 100%; max-width: 800px; height: 160px;
            background: #0a0e14; border: 2px solid #1f242c; margin: 50px 0;
            overflow: hidden; border-radius: 10px;
            box-shadow: inset 0 0 50px #000;
        }

        /* Línea de selección central */
        .selector {
            position: absolute; left: 50%; top: 0; bottom: 0; width: 4px;
            background: var(--gold); z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 15px var(--gold);
        }

        .item-list {
            display: flex; position: absolute; left: 0; top: 10px;
            transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1); /* Curva de frenado CS */
            will-change: transform;
        }

        .case-item {
            min-width: 140px; height: 140px; margin: 0 5px;
            background: #161b22; border-bottom: 5px solid #ccc;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2.5rem; position: relative; border-radius: 5px;
        }

        /* Colores de Rareza */
        .common { border-color: var(--rarity-common); background: linear-gradient(to top, rgba(75, 105, 255, 0.1), transparent); }
        .rare { border-color: var(--rarity-rare); background: linear-gradient(to top, rgba(136, 71, 255, 0.1), transparent); }
        .legend { border-color: var(--rarity-legend); background: linear-gradient(to top, rgba(235, 75, 75, 0.1), transparent); }
        .gold-item { border-color: var(--rarity-gold); background: linear-gradient(to top, rgba(228, 174, 57, 0.2), transparent); }

        .item-mult { position: absolute; bottom: 5px; font-size: 0.8rem; font-weight: bold; opacity: 0.8; }

        /* --- CONTROLES --- */
        .controls { background: var(--card-bg); padding: 30px; border-radius: 15px; border: 1px solid #1f242c; width: 300px; text-align: center; }
        .btn-open {
            width: 100%; padding: 15px; background: var(--gold); color: #000; border: none;
            border-radius: 5px; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .btn-open:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- WIN MODAL --- */
        #winModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: #fff; color: #000; padding: 40px; border-radius: 20px;
            text-align: center; z-index: 100; opacity: 0; visibility: hidden; transition: 0.5s;
        }
        #winModal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold; letter-spacing: 2px;">TACTICAL CASES</div>
    <div id="balance">100.00€</div>
</div>

<div class="roulette-wrapper">
    <div class="selector"></div>
    <div class="item-list" id="itemList">
        </div>
</div>

<div class="controls">
    <div style="margin-bottom: 10px; font-size: 0.8rem; opacity: 0.6;">COSTE DE APERTURA</div>
    <div style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px;">10.00€</div>
    <button id="openBtn" onclick="startOpening()" class="btn-open">ABRIR MALETÍN</button>
</div>

<div id="winModal">
    <div style="color: #666; font-size: 0.9rem;">HAS OBTENIDO</div>
    <div id="winIcon" style="font-size: 4rem; margin: 10px 0;">💰</div>
    <div id="winName" style="font-size: 1.5rem; font-weight: 900;">OBJETO RARO</div>
    <div id="winValue" style="color: var(--gold); font-weight: bold; margin-top: 5px;">+0.00€</div>
</div>

<script>
    let balance = 100.00;
    const itemWidth = 150; // Ancho + Margen
    const list = document.getElementById('itemList');
    const openBtn = document.getElementById('openBtn');

    const possibleItems = [
        { icon: '🔫', name: 'Pistola Básica', mult: 0.2, class: 'common' },
        { icon: '🔪', name: 'Navaja Táctica', mult: 1.5, class: 'rare' },
        { icon: '🧨', name: 'Granada Oro', mult: 5.0, class: 'legend' },
        { icon: '🏆', name: 'Cáliz Maestro', mult: 20.0, class: 'gold-item' }
    ];

    function generateItems() {
        list.innerHTML = '';
        // Generamos 80 items para que la ruleta parezca larga
        for(let i = 0; i < 80; i++) {
            let rand = Math.random();
            let item;
            if (rand < 0.02) item = possibleItems[3]; // 2% Oro
            else if (rand < 0.10) item = possibleItems[2]; // 8% Legend
            else if (rand < 0.40) item = possibleItems[1]; // 30% Raro
            else item = possibleItems[0]; // Resto Común

            const div = document.createElement('div');
            div.className = `case-item ${item.class}`;
            div.innerHTML = `<span>${item.icon}</span><span class="item-mult">x${item.mult.toFixed(1)}</span>`;
            div.dataset.mult = item.mult;
            div.dataset.name = item.name;
            div.dataset.icon = item.icon;
            list.appendChild(div);
        }
    }

    generateItems();

    function startOpening() {
        if(balance < 10) return;
        
        balance -= 10;
        updateUI();
        
        openBtn.disabled = true;
        generateItems(); // Regenerar para cada apertura
        
        list.style.transition = 'none';
        list.style.transform = 'translateX(0px)';
        
        // Forzamos reflow
        void list.offsetWidth;

        // Calculamos destino (detenerse entre el item 65 y 75)
        const targetIndex = 65 + Math.floor(Math.random() * 10);
        const randomOffset = Math.floor(Math.random() * 100) - 50; // Desfase para no caer siempre al centro
        const finalX = -(targetIndex * itemWidth) + (document.querySelector('.roulette-wrapper').offsetWidth / 2) - (itemWidth / 2) + randomOffset;

        list.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
        list.style.transform = `translateX(${finalX}px)`;

        // Al terminar la animación
        setTimeout(() => {
            const winningItem = list.children[targetIndex];
            const mult = parseFloat(winningItem.dataset.mult);
            const winAmount = 10 * mult;
            
            balance += winAmount;
            showWin(winningItem.dataset.icon, winningItem.dataset.name, winAmount);
            
            setTimeout(() => {
                openBtn.disabled = false;
                updateUI();
            }, 3000);
        }, 7100);
    }

    function showWin(icon, name, amount) {
        const modal = document.getElementById('winModal');
        document.getElementById('winIcon').innerText = icon;
        document.getElementById('winName').innerText = name;
        document.getElementById('winValue').innerText = `+${amount.toFixed(2)}€`;
        
        modal.classList.add('active');
        setTimeout(() => modal.classList.remove('active'), 2500);
    }

    function updateUI() {
        document.getElementById('balance').innerText = balance.toFixed(2) + "€";
    }
</script>

</body>
</html>
