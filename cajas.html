<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Loot - Hardcore Edition</title>
    <style>
        :root {
            --bg: #030508;
            --gold: #d4af37;
            --red: #ff3e3e;
            --card-bg: #0d1117;
            --rarity-0: #4b4b4b; /* Basura */
            --rarity-1: #4b69ff; /* Azul */
            --rarity-2: #8847ff; /* Morado */
            --rarity-3: #eb4b4b; /* Rojo */
            --rarity-4: #e4ae39; /* Oro */
        }

        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* --- PANTALLAS DE SEGURIDAD --- */
        #unlockScreen, #banScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #banScreen { display: none; background: radial-gradient(circle, #200 0%, #000 100%); }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 320px; }
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #000; color: var(--gold); text-align: center; font-weight: bold; }

        /* --- LAYOUT --- */
        #gameArea { display: none; width: 100%; max-width: 1000px; padding: 20px; flex-direction: column; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--card-bg); padding: 15px; border-radius: 10px; border-bottom: 2px solid var(--gold); }
        
        /* --- RULETA --- */
        .roulette-container { position: relative; width: 100%; height: 180px; background: #07090c; border: 2px solid #1f242c; overflow: hidden; border-radius: 5px; margin-bottom: 30px; }
        .selector-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 3px; background: var(--gold); z-index: 10; box-shadow: 0 0 15px var(--gold); transform: translateX(-50%); }
        .item-strip { display: flex; position: absolute; left: 0; top: 15px; will-change: transform; transition: transform 8s cubic-bezier(0.1, 0, 0.05, 1); }
        
        .item-box {
            min-width: 150px; height: 150px; margin: 0 5px; background: #11141a; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-bottom: 4px solid transparent; position: relative;
        }
        .item-box span { font-size: 3rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }

        /* --- INVENTARIO --- */
        .inventory-section { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-top: 20px; }
        .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 15px; max-height: 200px; overflow-y: auto; }
        .inv-slot { aspect-ratio: 1; background: #05070a; border: 1px solid #1f242c; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }

        /* --- BOTONES --- */
        .controls { text-align: center; margin: 20px 0; }
        .btn-main { background: var(--gold); color: #000; border: none; padding: 18px 50px; border-radius: 5px; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-main:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-main:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }

        /* --- WIN MODAL --- */
        #winModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: #fff; color: #000; padding: 40px; border-radius: 15px; z-index: 1000;
            opacity: 0; visibility: hidden; transition: 0.5s; text-align: center;
        }
        #winModal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
    </style>
</head>
<body>

<div id="banScreen">
    <h1 style="color: var(--red);">SISTEMA COMPROMETIDO</h1>
    <p id="banReasonText">Violación de protocolo de seguridad</p>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">SECURE TERMINAL</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="ACCESS KEY">
        <button onclick="tryUnlock()" class="btn-main" style="padding: 10px 30px;">AUTH</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 15px; font-size: 0.8rem;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="header">
        <div>SALDO: <span id="balance" style="color: var(--gold);">0.00€</span></div>
        <div style="font-size: 0.8rem; opacity: 0.5;">SERVER: MAD-EST-1</div>
    </div>

    <div class="roulette-container">
        <div class="selector-line"></div>
        <div class="item-strip" id="itemStrip"></div>
    </div>

    <div class="controls">
        <div style="margin-bottom: 10px; font-size: 0.9rem; letter-spacing: 2px;">COSTE APERTURA: 25.00€</div>
        <button id="openBtn" onclick="startCase()" class="btn-main">OPEN CASE</button>
    </div>

    <div class="inventory-section">
        <div style="font-weight: bold; border-left: 3px solid var(--gold); padding-left: 10px;">TU INVENTARIO</div>
        <div class="inv-grid" id="invGrid">
            </div>
    </div>
</div>

<div id="winModal">
    <div id="winRarity" style="font-size: 0.7rem; font-weight: 900; margin-bottom: 5px;">RARITY</div>
    <div id="winIcon" style="font-size: 5rem; margin: 10px 0;">📦</div>
    <div id="winName" style="font-size: 1.5rem; font-weight: 900;">OBJETO</div>
    <div id="winValue" style="color: #188a53; font-size: 1.3rem; font-weight: bold; margin-top: 10px;">+0.00€</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    const caseCost = 25.00;
    const itemWidth = 160;

    const lootTable = [
        { icon: '🔩', name: 'Tornillo Oxidado', mult: 0.01, rarity: 'BASURA', color: 'var(--rarity-0)', p: 0.75 },
        { icon: '🔋', name: 'Pila Gastada', mult: 0.2, rarity: 'COMÚN', color: 'var(--rarity-0)', p: 0.75 },
        { icon: '🔪', name: 'Cuchillo Caza', mult: 1.1, rarity: 'INDUSTRIAL', color: 'var(--rarity-1)', p: 0.18 },
        { icon: '🔫', name: 'Pistola 9mm', mult: 2.5, rarity: 'MILITAR', color: 'var(--rarity-2)', p: 0.055 },
        { icon: '🛡️', name: 'Chaleco Pesado', mult: 6.0, rarity: 'TÁCTICO', color: 'var(--rarity-3)', p: 0.012 },
        { icon: '💎', name: 'Diamante Bruto', mult: 25.0, rarity: 'RELIQUIA', color: 'var(--rarity-4)', p: 0.003 }
    ];

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            const data = snap.val();
            if(data.saldo === -1) { showBan(data.motivoBan); return; }
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            buildStrip();
        } else { document.getElementById('errorMsg').innerText = "ERROR DE AUTENTICACIÓN"; }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            const data = snap.val();
            if(!data || data.saldo === -1) { showBan(data?.motivoBan); return; }
            isInfinite = data.saldo.toString().includes("@");
            balance = isInfinite ? 999999 : parseFloat(data.saldo);
            document.getElementById('balance').innerText = isInfinite ? "∞" : balance.toFixed(2) + "€";
        });
    }

    function showBan(m) {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('banScreen').style.display = 'flex';
        document.getElementById('banReasonText').innerText = m || "Ticket de seguridad inválido";
    }

    function getWeightedItem() {
        let r = Math.random();
        if (r < 0.003) return lootTable[5];      // 0.3% Oro
        if (r < 0.015) return lootTable[4];      // 1.2% Rojo
        if (r < 0.07) return lootTable[3];       // 5.5% Morado
        if (r < 0.25) return lootTable[2];       // 18% Azul
        return lootTable[Math.floor(Math.random()*2)]; // 75% Gris
    }

    function buildStrip() {
        const strip = document.getElementById('itemStrip');
        strip.innerHTML = '';
        for(let i = 0; i < 100; i++) {
            const item = getWeightedItem();
            const div = document.createElement('div');
            div.className = 'item-box';
            div.style.borderBottomColor = item.color;
            div.innerHTML = `<span>${item.icon}</span><div style="font-size:0.6rem; opacity:0.5">${item.rarity}</div>`;
            div.dataset.itemData = JSON.stringify(item);
            strip.appendChild(div);
        }
    }

    function startCase() {
        if(balance < caseCost && !isInfinite) return;
        
        const btn = document.getElementById('openBtn');
        btn.disabled = true;
        
        if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance - caseCost);
        
        buildStrip();
        const strip = document.getElementById('itemStrip');
        strip.style.transition = 'none';
        strip.style.transform = 'translateX(0px)';
        void strip.offsetWidth;

        const targetIndex = 85 + Math.floor(Math.random() * 8);
        const randomOffset = Math.floor(Math.random() * 80) - 40;
        const finalX = -(targetIndex * itemWidth) + (document.querySelector('.roulette-container').offsetWidth / 2) - (itemWidth / 2) + randomOffset;

        strip.style.transition = 'transform 8s cubic-bezier(0.1, 0, 0.05, 1)';
        strip.style.transform = `translateX(${finalX}px)`;

        setTimeout(() => {
            const winner = JSON.parse(strip.children[targetIndex].dataset.itemData);
            const winAmount = caseCost * winner.mult;
            
            if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance + winAmount);
            
            showWin(winner, winAmount);
            addToInventory(winner.icon);

            setTimeout(() => { btn.disabled = false; }, 2000);
        }, 8100);
    }

    function addToInventory(icon) {
        const grid = document.getElementById('invGrid');
        const slot = document.createElement('div');
        slot.className = 'inv-slot';
        slot.innerText = icon;
        grid.prepend(slot);
    }

    function showWin(item, amount) {
        const modal = document.getElementById('winModal');
        document.getElementById('winRarity').innerText = item.rarity;
        document.getElementById('winRarity').style.color = item.color;
        document.getElementById('winIcon').innerText = item.icon;
        document.getElementById('winName').innerText = item.name;
        document.getElementById('winValue').innerText = `+${amount.toFixed(2)}€`;
        
        modal.classList.add('active');
        setTimeout(() => modal.classList.remove('active'), 3000);
    }
</script>
</body>
</html>
