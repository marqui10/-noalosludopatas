<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Mines - VIP Edition</title>
    <style>
        :root {
            --bg-dark: #0f141b;
            --panel-bg: #1a212a;
            --accent-green: #00e676;
            --accent-red: #ff3e3e;
            --gold: #d4af37;
            --tile-bg: #2c3a4a;
            --tile-hover: #3d4f63;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #unlockScreen, #banScreen {
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        #banScreen { background: radial-gradient(circle, #400 0%, #000 100%); display: none; }

        .auth-card {
            background: var(--panel-bg);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid var(--gold);
            text-align: center;
            width: 320px;
        }

        #gameArea {
            display: none;
            width: 95%;
            max-width: 1100px;
            grid-template-columns: 320px 1fr;
            gap: 25px;
            padding: 20px;
        }

        .sidebar {
            background: var(--panel-bg);
            padding: 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 1px solid #2d3846;
        }

        .balance-box { background: #0d1217; padding: 15px; border-radius: 8px; border-left: 4px solid var(--gold); }
        .balance-label { font-size: 0.7rem; color: #8b9eb5; text-transform: uppercase; }
        .balance-val { color: var(--gold); font-weight: 900; font-size: 1.4rem; display: block; }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; text-transform: uppercase; color: #5f7086; font-weight: bold; }
        input, select {
            background: #0d1217;
            border: 1px solid #303f50;
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            outline: none;
        }

        .btn-bet {
            background: var(--accent-green);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 6px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-bet:hover { filter: brightness(1.1); }
        .btn-cashout { background: var(--gold); display: none; }

        .grid-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid #2d3846;
        }

        .mines-grid {
            display: grid;
            gap: 10px;
            width: 100%;
            max-width: 500px;
        }

        .tile {
            aspect-ratio: 1;
            background: var(--tile-bg);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            cursor: pointer;
            border-bottom: 4px solid rgba(0,0,0,0.4);
        }
        .tile.revealed { cursor: default; background: #1a222c; border-bottom: none; }
        .tile.gem { background: linear-gradient(135deg, #00e676 0%, #00a052 100%); }
        .tile.bomb { background: linear-gradient(135deg, #ff3e3e 0%, #b32626 100%); }

        .multiplier-info { margin-top: 25px; font-size: 2rem; font-weight: 900; color: var(--accent-green); }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="auth-card" style="border-color: var(--accent-red);">
        <h1 style="color: var(--accent-red);">BLOQUEADO</h1>
    </div>
</div>

<div id="unlockScreen">
    <div class="auth-card">
        <h2 style="color: var(--gold);">MINES ACCESS</h2>
        <input type="password" id="keyInput" placeholder="ACCESS KEY" style="width: 80%; text-align: center; margin-bottom: 20px;">
        <button onclick="tryUnlock()" class="btn-bet" style="width: 100%;">ENTRAR</button>
    </div>
</div>

<div id="gameArea">
    <div class="sidebar">
        <div class="balance-box">
            <span class="balance-label">Saldo</span>
            <span id="balanceDisplay" class="balance-val">0.00€</span>
        </div>
        
        <div class="input-group">
            <label>Tamaño Tablero</label>
            <select id="gridSize" onchange="initGrid()">
                <option value="3">3x3 (9 cajas)</option>
                <option value="4">4x4 (16 cajas)</option>
                <option value="5" selected>5x5 (25 cajas)</option>
                <option value="6">6x6 (36 cajas)</option>
            </select>
        </div>

        <div class="input-group">
            <label>Apuesta</label>
            <input type="number" id="betInput" value="10.00" min="0.1" step="0.01">
        </div>

        <div class="input-group">
            <label>Minas</label>
            <input type="number" id="minesInput" value="3" min="1">
        </div>

        <button id="betBtn" onclick="startGame()" class="btn-bet">Jugar</button>
        <button id="cashoutBtn" onclick="cashout()" class="btn-bet btn-cashout">Retirar</button>
        <div id="statusMsg" style="text-align:center; color:#5f7086; font-size:0.8rem;"></div>
    </div>

    <div class="grid-container">
        <h2 style="letter-spacing: 8px;">MINES</h2>
        <div class="mines-grid" id="minesGrid"></div>
        <div class="multiplier-info" id="multDisplay">x0.00</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    let gameActive = false, currentMines = [], revealedTiles = 0;
    let currentBet = 0, currentMultiplier = 1, totalTiles = 25;

    // Función de truncado estricto a 2 decimales
    function truncar(num) {
        if (typeof num !== 'number' || isNaN(num)) return num;
        return Math.trunc(num * 100) / 100;
    }

    function initGrid() {
        if(gameActive) return;
        const size = parseInt(document.getElementById('gridSize').value);
        totalTiles = size * size;
        const grid = document.getElementById('minesGrid');
        grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
        grid.innerHTML = '';
        for (let i = 0; i < totalTiles; i++) {
            const div = document.createElement('div');
            div.className = 'tile';
            div.onclick = () => revealTile(i);
            grid.appendChild(div);
        }
        document.getElementById('minesInput').max = totalTiles - 1;
    }

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'grid';
            initGrid();
        }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            if (parseFloat(data.saldo) < 0) {
                document.getElementById('gameArea').style.display = 'none';
                document.getElementById('banScreen').style.display = 'flex';
                return;
            }
            isInfinite = data.saldo.toString().includes("@");
            balance = isInfinite ? 999999 : parseFloat(data.saldo);
            document.getElementById('balanceDisplay').innerText = isInfinite ? "∞" : truncar(balance).toFixed(2) + "€";
        });
    }

    function combinations(n, k) {
        if (k < 0 || k > n) return 0;
        if (k === 0 || k === n) return 1;
        let res = 1;
        for (let i = 1; i <= Math.min(k, n - k); i++) res = res * (n - i + 1) / i;
        return res;
    }

    function calculateMultiplier() {
        const numMines = parseInt(document.getElementById('minesInput').value);
        const numGems = totalTiles - numMines;
        const probExito = combinations(numGems, revealedTiles) / combinations(totalTiles, revealedTiles);
        currentMultiplier = (1 / probExito) * 0.97;
    }

    function startGame() {
        const bet = parseFloat(document.getElementById('betInput').value);
        const minesCount = parseInt(document.getElementById('minesInput').value);
        if (balance < bet && !isInfinite) return alert("Sin saldo");
        
        gameActive = true;
        currentBet = bet;
        revealedTiles = 0;
        currentMines = [];
        while(currentMines.length < minesCount) {
            let r = Math.floor(Math.random() * totalTiles);
            if(!currentMines.includes(r)) currentMines.push(r);
        }

        if(!isInfinite) {
            db.ref('codes/' + currentKey + '/saldo').set(truncar(balance - bet));
        }
        
        initGrid();
        document.getElementById('multDisplay').innerText = "x1.00";
        document.getElementById('betBtn').style.display = 'none';
        document.getElementById('cashoutBtn').style.display = 'block';
        document.getElementById('cashoutBtn').innerText = "Retirar";
    }

    function revealTile(index) {
        if (!gameActive) return;
        const tiles = document.querySelectorAll('.tile');
        if (tiles[index].classList.contains('revealed')) return;

        tiles[index].classList.add('revealed');

        if (currentMines.includes(index)) {
            tiles[index].classList.add('bomb');
            tiles[index].innerText = '💣';
            gameOver(false);
        } else {
            tiles[index].classList.add('gem');
            tiles[index].innerText = '💎';
            revealedTiles++;
            calculateMultiplier();
            document.getElementById('multDisplay').innerText = `x${currentMultiplier.toFixed(2)}`;
            
            const maxGems = totalTiles - currentMines.length;
            if (revealedTiles === maxGems) {
                cashout();
            } else {
                document.getElementById('cashoutBtn').innerText = `Retirar ${truncar(currentBet * currentMultiplier).toFixed(2)}€`;
            }
        }
    }

    function cashout() {
        if (!gameActive || revealedTiles === 0) return;
        const winAmount = currentBet * currentMultiplier;
        if(!isInfinite) {
            db.ref('codes/' + currentKey + '/saldo').set(truncar(balance + winAmount));
        }
        gameOver(true);
    }

    function gameOver(win) {
        gameActive = false;
        const tiles = document.querySelectorAll('.tile');
        
        currentMines.forEach(m => {
            tiles[m].classList.add('revealed', 'bomb');
            tiles[m].innerText = '💣';
        });

        // Reinicio automático tras 2 segundos
        setTimeout(() => {
            resetTable();
        }, 2000);
    }

    function resetTable() {
        gameActive = false;
        document.getElementById('betBtn').style.display = 'block';
        document.getElementById('cashoutBtn').style.display = 'none';
        document.getElementById('multDisplay').innerText = "x0.00";
        initGrid();
    }
</script>
</body>
</html>
