<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Pro - Master Flight Edition</title>
    <style>
        :root {
            --bg: #0d1117;
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --red: #be1931;
            --green: #2ecc71;
            --text: #ffffff;
            --card-bg: #1c2128;
            --felt-border: #30363d;
        }

        body { margin: 0; font-family: 'Trebuchet MS', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* --- PANTALLAS DE ACCESO/BAN --- */
        #banScreen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        .ban-card { border: 3px solid var(--red); padding: 50px; border-radius: 20px; background: #111; box-shadow: 0 0 50px rgba(190, 25, 49, 0.5); width: 90%; max-width: 450px; }
        #unlockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; width: 300px; }
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid var(--gold); font-size: 1.1rem; text-align: center; background: #000; color: var(--gold-light); box-sizing: border-box; }

        /* --- INTERFAZ JUEGO --- */
        #gameArea { display: none; width: 100%; max-width: 800px; padding: 20px; flex-direction: column; align-items: center; box-sizing: border-box; }
        .stats-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px 30px; background: var(--card-bg); border-radius: 10px; border-bottom: 3px solid var(--gold); margin-bottom: 15px; box-sizing: border-box; }

        /* --- ÁREA CRASH CON VUELO --- */
        .crash-display {
            width: 100%; height: 350px; background: #05070a; border: 2px solid var(--felt-border); border-radius: 15px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        #flightCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #multiplier { font-size: 5.5rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 25px rgba(212, 175, 55, 0.5); z-index: 5; transition: transform 0.1s; pointer-events: none; }
        #multiplier.crashed { color: var(--red); animation: shake 0.3s; transform: scale(1.1); text-shadow: 0 0 35px rgba(190, 25, 49, 0.7); }

        @keyframes shake {
            0%, 100% { transform: scale(1.1) translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: scale(1.1) translate(-6px, 0); }
            20%, 40%, 60%, 80% { transform: scale(1.1) translate(6px, 0); }
        }

        /* --- CONTROLES --- */
        .controls { background: var(--card-bg); width: 100%; padding: 20px; border-radius: 15px; border: 1px solid var(--felt-border); display: flex; flex-direction: column; align-items: center; gap: 15px; box-sizing: border-box; width: 100%; }
        .bet-input-group { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { background: #000; border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 5px; width: 120px; text-align: center; font-size: 1.2rem; }
        .btn { padding: 15px 40px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; transition: 0.2s; width: 100%; }
        .btn-bet { background: var(--gold); color: black; }
        .btn-cashout { background: var(--green); color: white; display: none; }

        /* --- MODAL DE GANANCIA --- */
        #winModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            background: rgba(28, 33, 40, 0.98); border: 3px solid var(--gold); border-radius: 20px;
            padding: 30px; text-align: center; z-index: 2000; opacity: 0; visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 50px rgba(212, 175, 55, 0.5);
        }
        #winModal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        .win-title { color: var(--gold); font-size: 1.2rem; margin-bottom: 10px; }
        .win-amount { color: var(--text); font-size: 3.5rem; font-weight: 900; }

        /* --- HISTORIAL --- */
        .history { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; width: 100%; padding: 10px; min-height: 45px; justify-content: center; box-sizing: border-box; }
        .hist-item { padding: 6px 14px; border-radius: 20px; background: #333; font-size: 0.85rem; font-weight: bold; white-space: nowrap; }
        .hist-gold { color: var(--gold); border: 1px solid var(--gold); }
        .hist-red { color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="ban-card">
        <h1 style="color: var(--red);">🚫 ACCESO DENEGADO</h1>
        <p id="banReasonText">Cargando...</p>
        <button onclick="location.reload()" class="btn" style="background:#333; color:white; margin-top:20px;">REINTENTAR</button>
    </div>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">CRASH PRO</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="LLAVE MAESTRA">
        <button onclick="tryUnlock()" class="btn btn-bet">ENTRAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 10px;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="stats-bar">
        <div>SALDO: <span id="balDisplay" style="color: var(--gold-light); font-weight: 900;">0</span>€</div>
        <div id="statusLabel" style="color: var(--gold);">LISTO PARA DESPEGUE</div>
    </div>

    <div class="crash-display" id="crashContainer">
        <canvas id="flightCanvas"></canvas>
        <div id="multiplier">1.00x</div>
    </div>

    <div class="controls">
        <div class="bet-input-group">
            <span>APUESTA:</span>
            <input type="number" id="betAmount" value="10" min="1">
            <span>€</span>
        </div>
        <button id="mainBtn" onclick="handleMainAction()" class="btn btn-bet">INICIAR VUELO</button>
        <button id="cashoutBtn" onclick="cashOut()" class="btn btn-cashout">RETIRAR</button>
    </div>

    <div id="historyBar" class="history"></div>

    <div id="winModal">
        <div class="win-title">¡RETIRADA EXITOSA!</div>
        <div class="win-amount" id="modalAmount">0.00€</div>
        <div style="color: var(--gold-light); margin-top: 10px;" id="modalMultiplier">@ 1.00x</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    let gameRunning = false, canCashout = false;
    let currentMultiplier = 1.00, crashPoint = 0, gameInterval;

    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    let points = [];

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        if(!key) return;
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            const data = snap.val();
            if (data.saldo === -1) { showBan(data.motivoBan); return; }
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            resizeCanvas();
        } else { document.getElementById('errorMsg').innerText = "LLAVE INVÁLIDA"; }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            if(data.saldo === -1) { gameRunning = false; showBan(data.motivoBan); }
            else {
                isInfinite = data.saldo.toString().includes("@");
                balance = isInfinite ? 999999999 : parseFloat(data.saldo);
                updateUI();
            }
        });
    }

    function showBan(m) {
        if(gameInterval) clearInterval(gameInterval);
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('banScreen').style.display = 'flex';
        document.getElementById('banReasonText').innerText = m || "Acceso revocado";
    }

    function handleMainAction() {
        if(gameRunning) return;
        let bet = parseFloat(document.getElementById('betAmount').value);
        if(isNaN(bet) || bet <= 0 || (!isInfinite && bet > balance)) { alert("Saldo o apuesta inválida"); return; }
        if(!isInfinite) {
            balance -= bet;
            db.ref('codes/' + currentKey + '/saldo').set(balance);
        }
        startGame(bet);
    }

    function startGame(bet) {
        gameRunning = true; canCashout = true; currentMultiplier = 1.00;
        crashPoint = (Math.random() < 0.04) ? 1.00 : Math.max(1, (100 / (100 - (Math.random() * 99)) * 1.01)).toFixed(2);
        points = []; ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('cashoutBtn').style.display = 'block';
        document.getElementById('multiplier').className = '';
        document.getElementById('statusLabel').innerText = "VUELO EN CURSO";
        document.getElementById('statusLabel').style.color = "#2ecc71";

        gameInterval = setInterval(() => {
            currentMultiplier += 0.01 * (currentMultiplier ** 0.35);
            document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
            if(canCashout) document.getElementById('cashoutBtn').innerText = `RETIRAR ${(bet * currentMultiplier).toFixed(2)}€`;
            
            // Dibujar trayectoria
            const x = (points.length * 3);
            const y = canvas.height - (Math.pow(currentMultiplier, 1.8) * 20);
            points.push({x, y});
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 4; ctx.shadowBlur = 15; ctx.shadowColor = '#d4af37';
            for(let i=0; i < points.length; i++) {
                if(i === 0) ctx.moveTo(points[i].x, points[i].y);
                else ctx.lineTo(points[i].x, points[i].y);
            }
            ctx.stroke();
            if(x > canvas.width - 50) points.shift();

            if(currentMultiplier >= crashPoint) doCrash();
        }, 80);
    }

    function cashOut() {
        if(!canCashout) return;
        canCashout = false;
        let win = parseFloat(document.getElementById('betAmount').value) * currentMultiplier;
        if(!isInfinite) {
            balance += win;
            db.ref('codes/' + currentKey + '/saldo').set(balance);
        }
        // Modal
        const modal = document.getElementById('winModal');
        document.getElementById('modalAmount').innerText = win.toFixed(2) + "€";
        document.getElementById('modalMultiplier').innerText = "@ " + currentMultiplier.toFixed(2) + "x";
        modal.classList.add('active');
        setTimeout(() => modal.classList.remove('active'), 2500);

        document.getElementById('statusLabel').innerText = `¡GANASTE ${win.toFixed(2)}€!`;
        addHistory(currentMultiplier.toFixed(2), true);
        document.getElementById('cashoutBtn').style.display = 'none';
    }

    function doCrash() {
        clearInterval(gameInterval); gameRunning = false;
        const multDisplay = document.getElementById('multiplier');
        multDisplay.className = 'crashed';
        ctx.strokeStyle = '#be1931'; ctx.shadowColor = '#be1931'; ctx.stroke();
        document.getElementById('statusLabel').innerText = "CRASH DETECTADO";
        document.getElementById('statusLabel').style.color = "#be1931";
        
        if(canCashout) { 
            addHistory(currentMultiplier.toFixed(2), false);
            canCashout = false;
            if(!isInfinite && balance <= 0) db.ref('codes/' + currentKey + '/saldo').set(-1);
        }

        setTimeout(() => {
            if(!gameRunning) {
                document.getElementById('mainBtn').style.display = 'block';
                document.getElementById('cashoutBtn').style.display = 'none';
                multDisplay.innerText = "1.00x";
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                document.getElementById('statusLabel').innerText = "SISTEMAS OK";
                document.getElementById('statusLabel').style.color = "#d4af37";
            }
        }, 3000);
    }

    function addHistory(val, won) {
        const bar = document.getElementById('historyBar');
        const item = document.createElement('div');
        item.className = `hist-item ${won ? 'hist-gold' : 'hist-red'}`;
        item.innerText = val + "x";
        bar.prepend(item);
        if(bar.children.length > 8) bar.lastChild.remove();
    }

    function updateUI() { document.getElementById('balDisplay').innerText = isInfinite ? "∞" : Math.floor(balance); }
</script>
</body>
</html>
