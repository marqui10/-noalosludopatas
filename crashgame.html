<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Pro - DB Master Edition</title>
    <style>
        :root {
            --bg: #0d1117;
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --red: #be1931;
            --green: #2ecc71;
            --text: #ffffff;
            --card-bg: #1c2128;
            --felt-border: #30363d;
        }

        body { margin: 0; font-family: 'Trebuchet MS', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* --- PANTALLAS DE ACCESO/BAN --- */
        #banScreen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        .ban-card { border: 3px solid var(--red); padding: 50px; border-radius: 20px; background: #111; box-shadow: 0 0 50px rgba(190, 25, 49, 0.5); width: 90%; max-width: 450px; }
        #unlockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; width: 300px; }
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid var(--gold); font-size: 1.1rem; text-align: center; background: #000; color: var(--gold-light); box-sizing: border-box; }

        /* --- INTERFAZ JUEGO --- */
        #gameArea { display: none; width: 100%; max-width: 800px; padding: 20px; flex-direction: column; align-items: center; box-sizing: border-box; }
        .stats-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px 30px; background: var(--card-bg); border-radius: 10px; border-bottom: 3px solid var(--gold); margin-bottom: 15px; box-sizing: border-box; }

        /* --- ÁREA CRASH CON ANIMACIONES --- */
        .crash-display {
            width: 100%; height: 300px; background: #05070a; border: 2px solid var(--felt-border); border-radius: 15px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; transition: background-color 0.2s;
        }
        
        /* Efecto de pulso en el fondo mientras sube */
        .crash-display.running::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, rgba(5,7,10,1) 70%);
            animation: pulse-bg 2s infinite; z-index: 1;
        }

        /* Efecto de parpadeo rojo al crash */
        .crash-display.crashed {
            animation: blink-red 0.15s 4 alternate;
            background-color: rgba(190, 25, 49, 0.2);
        }

        #multiplier { font-size: 5rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); z-index: 2; transition: transform 0.1s; position: relative; }
        
        /* Animación de vibración del multiplicador al crash */
        #multiplier.crashed { color: var(--red); animation: shake 0.3s; transform: scale(1.1); text-shadow: 0 0 30px rgba(190, 25, 49, 0.6); }

        /* Keyframes Animations */
        @keyframes pulse-bg { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes blink-red { from { background-color: rgba(190, 25, 49, 0.5); } to { background-color: #05070a; } }
        @keyframes shake {
            0%, 100% { transform: scale(1.1) translate(0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: scale(1.1) translate(-5px, 0); }
            20%, 40%, 60%, 80% { transform: scale(1.1) translate(5px, 0); }
        }

        /* --- CONTROLES --- */
        .controls { background: var(--card-bg); width: 100%; padding: 20px; border-radius: 15px; border: 1px solid var(--felt-border); display: flex; flex-direction: column; align-items: center; gap: 15px; box-sizing: border-box; }
        .bet-input-group { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { background: #000; border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 5px; width: 120px; text-align: center; font-size: 1.2rem; }
        
        .btn { padding: 15px 40px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; transition: 0.2s; width: 100%; }
        .btn-bet { background: var(--gold); color: black; }
        .btn-cashout { background: var(--green); color: white; display: none; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- HISTORIAL --- */
        .history { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; width: 100%; padding: 10px; min-height: 40px; justify-content: center; box-sizing: border-box; }
        .hist-item { padding: 5px 12px; border-radius: 20px; background: #333; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
        .hist-gold { color: var(--gold); border: 1px solid var(--gold); }
        .hist-red { color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="ban-card">
        <h1 style="color: var(--red);">🚫 ACCESO DENEGADO</h1>
        <p id="banReasonText">Cargando...</p>
        <button onclick="location.reload()" class="btn" style="background:#333; color:white; margin-top:20px;">REINTENTAR</button>
    </div>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">CRASH PRO</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="LLAVE MAESTRA">
        <button onclick="tryUnlock()" class="btn btn-bet">ENTRAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 10px;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="stats-bar">
        <div>SALDO: <span id="balDisplay" style="color: var(--gold-light); font-weight: 900;">0</span>€</div>
        <div id="statusLabel" style="color: var(--gold);">PREPARADO</div>
    </div>

    <div class="crash-display" id="crashContainer">
        <div id="multiplier">1.00x</div>
    </div>

    <div class="controls">
        <div class="bet-input-group">
            <span>APUESTA:</span>
            <input type="number" id="betAmount" value="10" min="1">
            <span>€</span>
        </div>
        <button id="mainBtn" onclick="handleMainAction()" class="btn btn-bet">APOSTAR</button>
        <button id="cashoutBtn" onclick="cashOut()" class="btn btn-cashout">RETIRAR</button>
    </div>

    <div id="historyBar" class="history"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    let gameRunning = false, canCashout = false;
    let currentMultiplier = 1.00, crashPoint = 0, gameInterval;

    // --- ACCESO Y SEGURIDAD ---
    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        if(!key) return;
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            const data = snap.val();
            if (data.saldo === -1) {
                showBan(data.motivoBan);
                return;
            }
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
        } else { 
            document.getElementById('errorMsg').innerText = "LLAVE INVÁLIDA"; 
        }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            if(data.saldo === -1) {
                gameRunning = false;
                showBan(data.motivoBan);
            } else {
                isInfinite = data.saldo.toString().includes("@");
                balance = isInfinite ? 999999999 : parseFloat(data.saldo);
                updateUI();
            }
        });
    }

    function showBan(m) {
        if(gameInterval) clearInterval(gameInterval);
        gameRunning = false;
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('banScreen').style.display = 'flex';
        document.getElementById('banReasonText').innerText = m || "Acceso revocado";
        document.getElementById('crashContainer').className = 'crash-display';
    }

    // --- LÓGICA DEL JUEGO ---
    function handleMainAction() {
        if(gameRunning) return;
        
        let bet = parseFloat(document.getElementById('betAmount').value);
        if(isNaN(bet) || bet <= 0) { alert("Apuesta inválida"); return; }
        if(!isInfinite && bet > balance) { alert("Saldo insuficiente"); return; }

        if(!isInfinite) {
            balance -= bet;
            db.ref('codes/' + currentKey + '/saldo').set(balance);
        }

        startGame(bet);
    }

    function startGame(bet) {
        gameRunning = true;
        canCashout = true;
        currentMultiplier = 1.00;
        crashPoint = generateCrashPoint();
        
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('cashoutBtn').style.display = 'block';
        
        const container = document.getElementById('crashContainer');
        const multDisplay = document.getElementById('multiplier');
        
        // Reset estados de animación
        container.className = 'crash-display running';
        multDisplay.className = '';
        multDisplay.innerText = "1.00x";
        
        document.getElementById('statusLabel').innerText = "EN VUELO...";
        document.getElementById('statusLabel').style.color = "#2ecc71";

        gameInterval = setInterval(() => {
            currentMultiplier += 0.01 * (currentMultiplier ** 0.4); // Curva de subida
            multDisplay.innerText = currentMultiplier.toFixed(2) + "x";
            
            if(canCashout) {
                document.getElementById('cashoutBtn').innerText = `RETIRAR ${(bet * currentMultiplier).toFixed(2)}€`;
            }

            if(currentMultiplier >= crashPoint) {
                doCrash();
            }
        }, 100);
    }

    function generateCrashPoint() {
        const r = Math.random();
        if (r < 0.03) return 1.00; // 3% crash instantáneo
        // Lógica de probabilidad sesgada a multiplicadores bajos
        return Math.max(1, (100 / (100 - (Math.random() * 99)) * 1.01)).toFixed(2);
    }

    function cashOut() {
        if(!canCashout) return;
        canCashout = false;
        
        let bet = parseFloat(document.getElementById('betAmount').value);
        let win = bet * currentMultiplier;

        if(!isInfinite) {
            balance += win;
            db.ref('codes/' + currentKey + '/saldo').set(balance);
        }

        document.getElementById('statusLabel').innerText = `¡RETIRADO: ${win.toFixed(2)}€!`;
        document.getElementById('statusLabel').style.color = "#d4af37";
        addHistory(currentMultiplier.toFixed(2), true);
        document.getElementById('cashoutBtn').style.display = 'none';
    }

    function doCrash() {
        clearInterval(gameInterval);
        gameRunning = false;
        
        const container = document.getElementById('crashContainer');
        const multDisplay = document.getElementById('multiplier');
        
        // Activar animaciones de Crash
        container.className = 'crash-display crashed';
        multDisplay.className = 'crashed';
        multDisplay.innerText = currentMultiplier.toFixed(2) + "x";
        
        document.getElementById('statusLabel').innerText = "¡CRASH!";
        document.getElementById('statusLabel').style.color = "#be1931";
        
        if(canCashout) { 
            addHistory(currentMultiplier.toFixed(2), false);
            canCashout = false;
            // Si pierde todo y no es infinito, banear
            if(!isInfinite && balance <= 0) {
                db.ref('codes/' + currentKey + '/saldo').set(-1);
            }
        }

        setTimeout(() => {
            if(!gameRunning) {
                document.getElementById('mainBtn').style.display = 'block';
                document.getElementById('cashoutBtn').style.display = 'none';
                
                // Reset visual
                container.className = 'crash-display';
                multDisplay.className = '';
                multDisplay.innerText = "1.00x";
                
                document.getElementById('statusLabel').innerText = "PREPARADO";
                document.getElementById('statusLabel').style.color = "#d4af37";
            }
        }, 3500);
    }

    function addHistory(val, won) {
        const bar = document.getElementById('historyBar');
        const item = document.createElement('div');
        item.className = `hist-item ${won ? 'hist-gold' : 'hist-red'}`;
        item.innerText = val + "x";
        bar.prepend(item);
        if(bar.children.length > 10) bar.lastChild.remove();
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = isInfinite ? "∞" : Math.floor(balance);
    }
</script>
</body>
</html>
