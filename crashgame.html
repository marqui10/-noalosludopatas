<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Pro - Tactical Edition</title>
    <style>
        :root {
            --bg: #05070a;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.6);
            --red: #ff3e3e;
            --green: #00ff88;
            --text: #e1e1e1;
            --card-bg: #0d1117;
            --grid: rgba(212, 175, 55, 0.05);
        }

        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; }

        /* --- ACCESO / BAN --- */
        #unlockScreen, #banScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #banScreen { display: none; background: radial-gradient(circle, #200 0%, #000 100%); }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; box-shadow: 0 0 30px rgba(0,0,0,0.5); width: 320px; }
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 8px; border: 1px solid #30363d; background: #000; color: var(--gold); text-align: center; font-size: 1.2rem; font-weight: bold; }

        /* --- DISPLAY PRINCIPAL --- */
        #gameArea { display: none; width: 100%; max-width: 900px; height: 100vh; padding: 15px; flex-direction: column; box-sizing: border-box; }
        
        .stats-bar { display: flex; justify-content: space-between; padding: 15px; background: var(--card-bg); border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--gold); }

        .crash-display {
            flex-grow: 1; background: #000; border-radius: 15px; position: relative; overflow: hidden;
            border: 1px solid #1f242c; margin-bottom: 15px;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 40px 40px; transition: background-position 0.1s linear;
        }

        #flightCanvas { position: absolute; inset: 0; z-index: 1; }

        #multiplier { 
            font-size: 6rem; font-weight: 900; color: #fff; z-index: 5; position: relative;
            text-shadow: 0 0 20px rgba(255,255,255,0.2); transition: transform 0.05s; 
        }
        
        .running #multiplier { color: var(--gold); text-shadow: 0 0 30px var(--gold-glow); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- CONTROLES TÁCTICOS --- */
        .controls { background: var(--card-bg); padding: 20px; border-radius: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border: 1px solid #1f242c; }
        .bet-group { display: flex; flex-direction: column; gap: 5px; }
        input[type="number"] { background: #000; border: 1px solid #30363d; color: #fff; padding: 12px; border-radius: 8px; font-size: 1.3rem; text-align: center; }

        .btn { border-radius: 8px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; transition: 0.2s; height: 100%; }
        .btn-bet { background: var(--gold); color: #000; box-shadow: 0 4px 0 #92751f; }
        .btn-bet:active { transform: translateY(4px); box-shadow: none; }
        .btn-cashout { background: var(--green); color: #000; box-shadow: 0 4px 0 #188a53; display: none; }

        /* --- MODAL WIN --- */
        #winModal {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.7);
            background: #fff; color: #000; border-radius: 15px; padding: 25px 50px;
            z-index: 2000; opacity: 0; visibility: hidden; transition: 0.3s;
            box-shadow: 0 0 100px var(--green);
        }
        #winModal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }

        /* --- HISTORIAL --- */
        .history { display: flex; gap: 8px; margin-top: 10px; overflow: hidden; height: 35px; justify-content: center; }
        .hist-item { padding: 4px 12px; border-radius: 5px; background: #1c2128; font-size: 0.8rem; font-weight: bold; border-bottom: 2px solid transparent; }
        .win { border-color: var(--gold); color: var(--gold); }
        .loss { border-color: var(--red); color: var(--red); }
    </style>
</head>
<body>

<div id="banScreen">
    <h1 style="color: var(--red);">SISTEMA BLOQUEADO</h1>
    <p id="banReasonText" style="font-size: 1.2rem;">Inconsistencia de datos detectada</p>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold); letter-spacing: 2px;">CRASH PRO</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="ACCESS KEY">
        <button onclick="tryUnlock()" class="btn btn-bet" style="width: 100%; height: 50px;">DECRYPT</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 15px; font-size: 0.9rem;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="stats-bar">
        <div>SALDO: <span id="balDisplay" style="color: var(--gold); font-weight: bold;">0</span>€</div>
        <div id="statusLabel" style="font-weight: bold; opacity: 0.6;">STANDBY</div>
    </div>

    <div class="crash-display" id="container">
        <canvas id="flightCanvas"></canvas>
        <div id="multiplier">1.00x</div>
    </div>

    <div class="controls">
        <div class="bet-group">
            <label style="font-size: 0.7rem; color: #8b949e;">INPUT STAKE (€)</label>
            <input type="number" id="betAmount" value="10">
        </div>
        <div>
            <button id="mainBtn" onclick="handleMainAction()" class="btn btn-bet" style="width:100%">START FLIGHT</button>
            <button id="cashoutBtn" onclick="cashOut()" class="btn btn-cashout" style="width:100%">CASHOUT</button>
        </div>
    </div>

    <div id="historyBar" class="history"></div>

    <div id="winModal">
        <div style="font-size: 0.9rem; opacity: 0.7;">WINNINGS RECEIVED</div>
        <div class="win-amount" id="modalAmount" style="font-size: 2.5rem; font-weight: 900;">0.00€</div>
        <div id="modalMultiplier" style="font-weight: bold; color: #444;">@ 1.00x</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    let gameRunning = false, canCashout = false;
    let currentMultiplier = 1.00, crashPoint = 0, gameInterval;
    let gridOffset = 0;

    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    let points = [];

    function resize() {
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;
    }
    window.onresize = resize;
    resize();

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/' + key).get();
        if(snap.exists()){
            const data = snap.val();
            if(data.saldo === -1) { showBan(data.motivoBan); return; }
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            resize();
        } else { document.getElementById('errorMsg').innerText = "INVALID ENCRYPTION KEY"; }
    }

    function startLiveSecurity() {
        db.ref('codes/' + currentKey).on('value', snap => {
            const data = snap.val();
            if(!data) return;
            if(data.saldo === -1) showBan(data.motivoBan);
            else {
                isInfinite = data.saldo.toString().includes("@");
                balance = isInfinite ? 999999999 : parseFloat(data.saldo);
                document.getElementById('balDisplay').innerText = isInfinite ? "∞" : balance.toFixed(2);
            }
        });
    }

    function showBan(m) {
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('banScreen').style.display = 'flex';
        document.getElementById('banReasonText').innerText = m || "Violation detected";
    }

    function handleMainAction() {
        if(gameRunning) return;
        let bet = parseFloat(document.getElementById('betAmount').value);
        if(bet <= 0 || (!isInfinite && bet > balance)) return;
        if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance - bet);
        startGame(bet);
    }

    function startGame(bet) {
        gameRunning = true; canCashout = true; currentMultiplier = 1.00;
        crashPoint = (Math.random() < 0.05) ? 1.00 : (100 / (100 - (Math.random() * 99)) * 1.01).toFixed(2);
        points = [];
        
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('cashoutBtn').style.display = 'block';
        document.getElementById('container').classList.add('running');
        document.getElementById('statusLabel').innerText = "LIVE FLIGHT";

        gameInterval = setInterval(() => {
            currentMultiplier += 0.01 * (currentMultiplier ** 0.4);
            document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
            document.getElementById('cashoutBtn').innerText = `CASHOUT ${(bet * currentMultiplier).toFixed(2)}€`;

            // Animación Rejilla
            gridOffset = (gridOffset + (currentMultiplier * 2)) % 40;
            document.getElementById('container').style.backgroundPosition = `-${gridOffset}px ${gridOffset}px`;

            drawPath();

            if(currentMultiplier >= crashPoint) doCrash();
        }, 70);
    }

    function drawPath() {
        const x = (points.length * 4);
        const y = canvas.height - (Math.pow(currentMultiplier, 1.6) * 30);
        points.push({x, y});

        ctx.clearRect(0,0, canvas.width, canvas.height);
        
        // Sombra de área
        ctx.beginPath();
        ctx.fillStyle = 'rgba(212, 175, 55, 0.05)';
        ctx.moveTo(points[0].x, canvas.height);
        points.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.lineTo(points[points.length-1].x, canvas.height);
        ctx.fill();

        // Línea Neón
        ctx.beginPath();
        ctx.strokeStyle = '#d4af37';
        ctx.lineWidth = 5;
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#d4af37';
        points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
        ctx.stroke();

        if(x > canvas.width * 0.7) points.shift();
    }

    function cashOut() {
        if(!canCashout) return;
        canCashout = false;
        let win = parseFloat(document.getElementById('betAmount').value) * currentMultiplier;
        if(!isInfinite) db.ref('codes/' + currentKey + '/saldo').set(balance + win);
        
        const m = document.getElementById('winModal');
        document.getElementById('modalAmount').innerText = win.toFixed(2) + "€";
        document.getElementById('modalMultiplier').innerText = "@ " + currentMultiplier.toFixed(2) + "x";
        m.classList.add('active');
        setTimeout(() => m.classList.remove('active'), 2500);

        addHistory(currentMultiplier.toFixed(2), true);
        document.getElementById('cashoutBtn').style.display = 'none';
        document.getElementById('statusLabel').innerText = "SECURED";
    }

    function doCrash() {
        clearInterval(gameInterval);
        gameRunning = false;
        document.getElementById('container').classList.remove('running');
        document.getElementById('multiplier').style.color = 'var(--red)';
        
        // Línea Roja de impacto
        ctx.strokeStyle = '#ff3e3e';
        ctx.shadowColor = '#ff3e3e';
        ctx.stroke();

        if(canCashout) {
            addHistory(currentMultiplier.toFixed(2), false);
            canCashout = false;
            if(!isInfinite && balance <= 0) db.ref('codes/' + currentKey + '/saldo').set(-1);
        }

        setTimeout(() => {
            if(!gameRunning) {
                document.getElementById('mainBtn').style.display = 'block';
                document.getElementById('cashoutBtn').style.display = 'none';
                document.getElementById('multiplier').innerText = "1.00x";
                document.getElementById('multiplier').style.color = "";
                ctx.clearRect(0,0, canvas.width, canvas.height);
                document.getElementById('statusLabel').innerText = "STANDBY";
            }
        }, 3000);
    }

    function addHistory(v, w) {
        const bar = document.getElementById('historyBar');
        const item = document.createElement('div');
        item.className = `hist-item ${w ? 'win' : 'loss'}`;
        item.innerText = v + "x";
        bar.prepend(item);
        if(bar.children.length > 10) bar.lastChild.remove();
    }
</script>
</body>
</html>
