<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Pro - DB Master Edition</title>
    <style>
        :root {
            --bg: #0d1117;
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --red: #be1931;
            --green: #2ecc71;
            --text: #ffffff;
            --card-bg: #1c2128;
        }

        body { margin: 0; font-family: 'Trebuchet MS', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* --- PANTALLAS DE ACCESO/BAN --- */
        #banScreen { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; text-align: center; }
        .ban-card { border: 3px solid var(--red); padding: 50px; border-radius: 20px; background: #111; box-shadow: 0 0 50px rgba(190, 25, 49, 0.5); width: 90%; max-width: 450px; }
        #unlockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; width: 300px; }
        input.key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid var(--gold); font-size: 1.1rem; text-align: center; background: #000; color: var(--gold-light); box-sizing: border-box; }

        /* --- INTERFAZ JUEGO --- */
        #gameArea { display: none; width: 100%; max-width: 800px; padding: 20px; flex-direction: column; align-items: center; box-sizing: border-box; }
        .stats-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px 30px; background: var(--card-bg); border-radius: 10px; border-bottom: 3px solid var(--gold); margin-bottom: 15px; box-sizing: border-box; }

        /* --- ÁREA CRASH --- */
        .crash-display {
            width: 100%; height: 300px; background: #05070a; border: 2px solid #30363d; border-radius: 15px;
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
        }
        #multiplier { font-size: 5rem; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); z-index: 2; }
        #multiplier.crashed { color: var(--red); }
        .rocket-svg { position: absolute; bottom: 20px; left: 20px; width: 50px; transition: transform 0.1s linear; opacity: 0.5; }

        /* --- CONTROLES --- */
        .controls { background: var(--card-bg); width: 100%; padding: 20px; border-radius: 15px; border: 1px solid #30363d; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .bet-input-group { display: flex; gap: 10px; align-items: center; }
        input[type="number"] { background: #000; border: 1px solid var(--gold); color: white; padding: 10px; border-radius: 5px; width: 100px; text-align: center; font-size: 1.2rem; }
        
        .btn { padding: 15px 40px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; transition: 0.2s; width: 100%; }
        .btn-bet { background: var(--gold); color: black; }
        .btn-cashout { background: var(--green); color: white; display: none; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- HISTORIAL --- */
        .history { display: flex; gap: 10px; margin-top: 15px; overflow-x: auto; width: 100%; padding: 10px; }
        .hist-item { padding: 5px 12px; border-radius: 20px; background: #333; font-size: 0.8rem; font-weight: bold; }
        .hist-gold { color: var(--gold); border: 1px solid var(--gold); }
        .hist-red { color: var(--red); border: 1px solid var(--red); }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="ban-card">
        <h1 style="color: var(--red);">🚫 ACCESO DENEGADO</h1>
        <p id="banReasonText">Cargando...</p>
        <button onclick="location.reload()" class="btn" style="background:#333; color:white; margin-top:20px;">REINTENTAR</button>
    </div>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">CRASH PRO</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="LLAVE MAESTRA">
        <button onclick="tryUnlock()" class="btn btn-bet">ENTRAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 10px;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="stats-bar">
        <div>SALDO: <span id="balDisplay" style="color: var(--gold-light); font-weight: 900;">0</span>€</div>
        <div id="statusLabel" style="color: var(--gold);">ESPERANDO...</div>
    </div>

    <div class="crash-display">
        <div id="multiplier">1.00x</div>
        <svg class="rocket-svg" viewBox="0 0 24 24" fill="var(--gold)">
            <path d="M12,2L4.5,20.29L5.21,21L12,18L18.79,21L19.5,20.29L12,2Z" />
        </svg>
    </div>

    <div class="controls">
        <div class="bet-input-group">
            <span>APUESTA:</span>
            <input type="number" id="betAmount" value="10" min="1">
            <span>€</span>
        </div>
        <button id="mainBtn" onclick="handleMainAction()" class="btn btn-bet">APOSTAR</button>
        <button id="cashoutBtn" onclick="cashOut()" class="btn btn-cashout">RETIRAR</button>
    </div>

    <div id="historyBar" class="history"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false;
    let gameRunning = false, canCashout = false;
    let currentMultiplier = 1.00, crashPoint = 0, gameInterval;

    // --- SEGURIDAD Y LOGIN ---
    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/'+key).get();
        if(snap.exists()){
            currentKey = key;
            startLiveSecurity();
            document.getElementById('unlockScreen').style.display='none';
            document.getElementById('gameArea').style.display='flex';
        } else { document.getElementById('errorMsg').innerText = "LLAVE INVÁLIDA"; }
    }

    function startLiveSecurity() {
        db.ref('codes/'+currentKey).on('value', snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            if(data.saldo === -1) {
                gameRunning = false;
                showBan(data.motivoBan);
            } else {
                isInfinite = data.saldo.toString().includes("@");
                balance = isInfinite ? 999999999 : data.saldo;
                updateUI();
            }
        });
    }

    function showBan(m) {
        document.getElementById('gameArea').style.display='none';
        document.getElementById('banScreen').style.display='flex';
        document.getElementById('banReasonText').innerText = m || "Acceso revocado";
    }

    // --- LÓGICA DEL JUEGO ---
    function handleMainAction() {
        if(gameRunning) return;
        
        let bet = parseFloat(document.getElementById('betAmount').value);
        if(isNaN(bet) || bet <= 0) return;
        if(!isInfinite && bet > balance) { alert("Saldo insuficiente"); return; }

        // Restar saldo
        if(!isInfinite) {
            balance -= bet;
            db.ref('codes/'+currentKey+'/saldo').set(balance);
        }

        startGame(bet);
    }

    function startGame(bet) {
        gameRunning = true;
        canCashout = true;
        currentMultiplier = 1.00;
        
        // Generar punto de crash (Lógica: mayor probabilidad de crash bajo, menor de alto)
        crashPoint = generateCrashPoint();
        
        document.getElementById('mainBtn').style.display = 'none';
        document.getElementById('cashoutBtn').style.display = 'block';
        document.getElementById('multiplier').classList.remove('crashed');
        document.getElementById('statusLabel').innerText = "EN VUELO...";
        document.getElementById('statusLabel').style.color = "#2ecc71";

        gameInterval = setInterval(() => {
            currentMultiplier += 0.01 * (currentMultiplier ** 0.5); // Aceleración suave
            document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";
            
            // Actualizar botón de cashout con ganancia potencial
            document.getElementById('cashoutBtn').innerText = `RETIRAR ${(bet * currentMultiplier).toFixed(2)}€`;

            if(currentMultiplier >= crashPoint) {
                doCrash();
            }
        }, 100);
    }

    function generateCrashPoint() {
        const e = 2.71828;
        const r = Math.random();
        // Fórmula de probabilidad estándar para juegos de crash
        return Math.max(1, (100 / (100 - (r * 99))).toFixed(2));
    }

    function cashOut() {
        if(!canCashout) return;
        canCashout = false;
        
        let bet = parseFloat(document.getElementById('betAmount').value);
        let win = bet * currentMultiplier;

        if(!isInfinite) {
            balance += win;
            db.ref('codes/'+currentKey+'/saldo').set(balance);
        }

        document.getElementById('statusLabel').innerText = `¡GANASTE ${win.toFixed(2)}€!`;
        document.getElementById('statusLabel').style.color = var(--green);
        addHistory(currentMultiplier.toFixed(2), true);
        
        // El juego sigue visualmente hasta el crash, pero el usuario ya cobró
        document.getElementById('cashoutBtn').style.display = 'none';
    }

    function doCrash() {
        clearInterval(gameInterval);
        gameRunning = false;
        
        document.getElementById('multiplier').classList.add('crashed');
        document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x CRASH!";
        document.getElementById('statusLabel').innerText = "CATASTROFE";
        document.getElementById('statusLabel').style.color = var(--red);
        
        if(canCashout) { // Si no ha retirado, perdió
            addHistory(currentMultiplier.toFixed(2), false);
            if(!isInfinite && balance <= 0) {
                db.ref('codes/'+currentKey+'/saldo').set(-1);
            }
        }

        setTimeout(() => {
            if(!gameRunning) {
                document.getElementById('mainBtn').style.display = 'block';
                document.getElementById('cashoutBtn').style.display = 'none';
                document.getElementById('multiplier').innerText = "1.00x";
                document.getElementById('multiplier').classList.remove('crashed');
                document.getElementById('statusLabel').innerText = "PREPARADO";
                document.getElementById('statusLabel').style.color = var(--gold);
            }
        }, 3000);

        canCashout = false;
    }

    function addHistory(val, won) {
        const bar = document.getElementById('historyBar');
        const item = document.createElement('div');
        item.className = `hist-item ${won ? 'hist-gold' : 'hist-red'}`;
        item.innerText = val + "x";
        bar.prepend(item);
        if(bar.children.length > 8) bar.lastChild.remove();
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = isInfinite ? "∞" : Math.floor(balance);
    }
</script>
</body>
</html>
