<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slot Bar 2026 - Master Edition</title>
    <style>
        :root {
            --bg: #05070a;
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --red: #be1931;
            --text: #ffffff;
            --slot-bg: #1c2128;
        }
        body { margin: 0; font-family: 'Trebuchet MS', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        #banScreen, #unlockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #banScreen { display: none; background: #000; }
        .card { background: #1c2128; padding: 40px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; width: 300px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid var(--gold); font-size: 1.1rem; text-align: center; background: #000; color: var(--gold-light); box-sizing: border-box; outline: none; }

        #gameArea { display: none; width: 100%; max-width: 500px; padding: 15px; flex-direction: column; align-items: center; }
        .stats-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px 20px; background: var(--slot-bg); border-radius: 10px; border-bottom: 3px solid var(--gold); margin-bottom: 15px; box-sizing: border-box; font-weight: bold; font-size: 1.1rem; }

        .machine-body { background: linear-gradient(180deg, #444 0%, #111 100%); padding: 15px; border-radius: 20px; border: 6px solid #555; width: 100%; box-sizing: border-box; box-shadow: 0 10px 0 #222; }
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #000; padding: 10px; border-radius: 10px; }
        .cell { height: 95px; background: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #000; border-bottom: 5px solid #ccc; transition: transform 0.1s; }
        
        .win-glow { animation: glow 0.4s infinite alternate; z-index: 10; box-shadow: inset 0 0 30px var(--gold); }
        @keyframes glow { from { background: #fff; transform: scale(1); } to { background: var(--gold-light); transform: scale(1.05); } }

        .paytable { margin-top: 15px; width: 100%; background: rgba(28, 33, 40, 0.9); border: 1px solid var(--gold); border-radius: 10px; padding: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; box-sizing: border-box; }
        .pay-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; border-bottom: 1px solid #333; padding: 5px 0; }
        .pay-item span:last-child { color: var(--gold-light); font-weight: bold; }

        .chip-box { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .chip { padding: 12px 22px; border: 2px solid var(--gold); border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--gold); transition: 0.2s; }
        .chip.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        
        .btn-spin { background: var(--red); color: white; border: none; padding: 22px; font-size: 1.6rem; font-weight: bold; border-radius: 12px; cursor: pointer; box-shadow: 0 6px 0 #700; width: 100%; margin-top: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .btn-spin:disabled { background: #555; box-shadow: none; transform: translateY(4px); cursor: default; }

        #resBanner { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 40px; border-radius: 25px; z-index: 10001; text-align: center; border: 6px solid var(--gold); box-shadow: 0 0 100px rgba(0,0,0,0.9); }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="card">
        <h1 style="color: var(--red);">SISTEMA BLOQUEADO</h1>
        <button onclick="location.reload()" class="btn-spin" style="padding:10px; font-size:1rem;">REINTENTAR</button>
    </div>
</div>

<div id="unlockScreen">
    <div class="card">
        <h2 style="color: var(--gold);">SLOT BAR 2026</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="LLAVE">
        <button onclick="tryUnlock()" class="btn-spin" style="padding:12px; font-size:1.1rem; margin:0; box-shadow:none;">ENTRAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 10px; font-size: 0.9rem;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="stats-bar">
        <div>SALDO: <span id="balDisplay" style="color: var(--gold-light);">0</span>€</div>
        <div style="color: var(--gold);">BET: <span id="betDisplay">10</span>€</div>
    </div>
    
    <div class="machine-body">
        <div class="grid-3x3" id="mainGrid">
            <div id="c0" class="cell">💎</div><div id="c1" class="cell">7️⃣</div><div id="c2" class="cell">🔔</div>
            <div id="c3" class="cell">🍒</div><div id="c4" class="cell">🍉</div><div id="c5" class="cell">🍋</div>
            <div id="c6" class="cell">🍊</div><div id="c7" class="cell">🍇</div><div id="c8" class="cell">❌</div>
        </div>
    </div>

    <div class="paytable">
        <div class="pay-item"><span>💎</span> <span id="p_diam">--</span></div>
        <div class="pay-item"><span>7️⃣</span> <span id="p_siet">--</span></div>
        <div class="pay-item"><span>🔔</span> <span id="p_camp">--</span></div>
        <div class="pay-item"><span>🍒</span> <span id="p_cher">--</span></div>
        <div class="pay-item"><span>🍉</span> <span id="p_sand">--</span></div>
        <div class="pay-item"><span>🍋</span> <span id="p_limo">--</span></div>
        <div class="pay-item"><span>🍊</span> <span id="p_nara">--</span></div>
        <div class="pay-item"><span>🍇</span> <span id="p_uvas">--</span></div>
    </div>

    <div class="chip-box">
        <div class="chip active" onclick="setBet(10, this)">10</div>
        <div class="chip" onclick="setBet(50, this)">50</div>
        <div class="chip" onclick="setBet(100, this)">100</div>
    </div>
    <button id="spinBtn" class="btn-spin" onclick="startSpin()">GIRAR</button>
</div>

<div id="resBanner">
    <h1 id="resWin" style="font-size:3.5rem; margin:10px 0;">0€</h1>
    <button onclick="document.getElementById('resBanner').style.display='none'" class="btn-spin" style="padding:10px; font-size:1.1rem; box-shadow:none;">COBRAR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", currentBet = 10, spinning = false;
    const multipliers = { '💎': 40, '7️⃣': 20, '🔔': 10, '🍒': 5, '🍉': 3, '🍋': 1.5, '🍊': 1.2, '🍇': 1.1 };

    // PESOS DE PROBABILIDAD (Ajustable)
    const symbolWeights = [
        { s: '💎', w: 0.03 }, { s: '7️⃣', w: 0.05 }, { s: '🔔', w: 0.08 },
        { s: '🍒', w: 0.12 }, { s: '🍉', w: 0.14 }, { s: '🍋', w: 0.18 },
        { s: '🍊', w: 0.20 }, { s: '🍇', w: 0.20 }
    ];

    function getRandomSymbol() {
        const rand = Math.random();
        let cumulative = 0;
        for (const item of symbolWeights) {
            cumulative += item.w;
            if (rand < cumulative) return item.s;
        }
        return '❌';
    }

    function registrarHistorial(tipo, monto) {
        if(!currentKey) return;
        const ahora = new Date().toLocaleString('es-ES', { 
            hour: '2-digit', minute: '2-digit', second: '2-digit', 
            day: '2-digit', month: '2-digit', year: 'numeric'
        });
        db.ref(`codes/${currentKey}/historial`).push({
            tipo: tipo, monto: monto, origen: "Slot Bar", fecha: ahora
        });
        db.ref(`codes/${currentKey}/ultimaMod`).set(ahora);
    }

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        if(!key) return;
        const snap = await db.ref('codes/'+key).get();
        if(snap.exists()){
            currentKey = key;
            db.ref('codes/'+currentKey).on('value', s => {
                const d = s.val();
                if(!d) return;
                if(d.saldo === -1) { 
                    document.getElementById('gameArea').style.display='none'; 
                    document.getElementById('banScreen').style.display='flex'; 
                } else {
                    balance = d.saldo;
                    document.getElementById('balDisplay').innerText = Math.floor(balance);
                    updateUI();
                }
            });
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            updatePaytable();
        } else {
            document.getElementById('errorMsg').innerText = "LLAVE INVÁLIDA";
        }
    }

    function setBet(v, el) {
        if(spinning) return;
        currentBet = v;
        document.getElementById('betDisplay').innerText = v;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        updatePaytable();
        updateUI();
    }

    function updatePaytable() {
        const ids = {'💎':'p_diam','7️⃣':'p_siet','🔔':'p_camp','🍒':'p_cher','🍉':'p_sand','🍋':'p_limo','🍊':'p_nara','🍇':'p_uvas'};
        for(let sym in multipliers) {
            if(ids[sym]) document.getElementById(ids[sym]).innerText = (currentBet * multipliers[sym]).toFixed(1) + "€";
        }
    }

    function startSpin() {
        if (spinning || balance < currentBet) return;
        spinning = true;
        balance -= currentBet;
        db.ref('codes/'+currentKey).update({ saldo: balance });
        registrarHistorial("Apuesta Spin", -currentBet);
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('win-glow'));

        let t = 0;
        let si = setInterval(() => {
            for(let i=0; i<9; i++) {
                const tmp = ['💎', '7️⃣', '🔔', '🍒', '🍉', '🍋', '🍊', '🍇', '❌'];
                document.getElementById('c'+i).innerText = tmp[Math.floor(Math.random()*tmp.length)];
            }
            t++;
            if(t > 22) { clearInterval(si); finalizeRealRandom(); }
        }, 65);
    }

    function finalizeRealRandom() {
        let winVal = 0;
        const gridCells = [];
        for(let i=0; i<9; i++) {
            const cell = document.getElementById('c'+i);
            cell.innerText = getRandomSymbol();
            gridCells.push(cell);
        }

        const lines = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontales
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Verticales
            [0, 4, 8], [2, 4, 6]             // Diagonales
        ];

        lines.forEach(line => {
            const s1 = gridCells[line[0]].innerText;
            const s2 = gridCells[line[1]].innerText;
            const s3 = gridCells[line[2]].innerText;
            if (s1 !== '❌' && s1 === s2 && s1 === s3) {
                winVal += (currentBet * multipliers[s1]);
                line.forEach(idx => gridCells[idx].classList.add('win-glow'));
            }
        });

        if (winVal > 0) {
            balance += winVal;
            db.ref('codes/'+currentKey).update({ saldo: balance });
            registrarHistorial("Premio Real", winVal);
            setTimeout(() => {
                document.getElementById('resWin').innerText = winVal.toFixed(1) + "€";
                document.getElementById('resBanner').style.display = 'block';
            }, 500);
        }
        spinning = false;
        updateUI();
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = Math.floor(balance);
        document.getElementById('spinBtn').disabled = spinning || balance < currentBet;
    }
</script>
</body>
</html>
