<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slot Bar 2026 - Real Reels Edition</title>
    <style>
        :root {
            --bg: #05070a;
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --red: #be1931;
            --text: #ffffff;
            --slot-bg: #1c2128;
        }
        body { margin: 0; font-family: 'Trebuchet MS', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        #banScreen, #unlockScreen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #banScreen { display: none; background: #000; }
        .card { background: #1c2128; padding: 40px; border-radius: 15px; border: 2px solid var(--gold); text-align: center; width: 300px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
        .key-input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid var(--gold); font-size: 1.1rem; text-align: center; background: #000; color: var(--gold-light); box-sizing: border-box; outline: none; }

        #gameArea { display: none; width: 100%; max-width: 600px; padding: 15px; flex-direction: column; align-items: center; }
        .stats-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px 20px; background: var(--slot-bg); border-radius: 10px; border-bottom: 3px solid var(--gold); margin-bottom: 15px; box-sizing: border-box; font-weight: bold; font-size: 1.1rem; }

        .machine-container { display: flex; align-items: center; gap: 20px; width: 100%; }
        .machine-body { background: linear-gradient(180deg, #444 0%, #111 100%); padding: 15px; border-radius: 20px; border: 6px solid #555; flex-grow: 1; box-shadow: 0 10px 0 #222; }
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #000; padding: 10px; border-radius: 10px; }
        .cell { height: 95px; background: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: #000; border-bottom: 5px solid #ccc; transition: transform 0.1s; }
        
        .lever-box { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .lever-base { width: 40px; height: 120px; background: #222; border-radius: 20px; position: relative; border: 3px solid #444; }
        .lever-arm { width: 12px; height: 80px; background: linear-gradient(to right, #888, #eee, #888); position: absolute; left: 14px; bottom: 50%; transform-origin: bottom center; transition: 0.3s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .lever-knob { width: 34px; height: 34px; background: radial-gradient(circle at 30% 30%, var(--red), #500); border-radius: 50%; position: absolute; top: -25px; left: -11px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .lever-arm.pulling { transform: rotateX(160deg); }

        .auto-controls { display: flex; flex-direction: column; align-items: center; background: #1c2128; padding: 10px; border-radius: 10px; border: 1px solid #444; }
        .auto-input { width: 50px; background: #000; color: var(--gold); border: 1px solid var(--gold); text-align: center; border-radius: 5px; margin-bottom: 5px; }

        .win-glow { animation: glow 0.4s infinite alternate; z-index: 10; box-shadow: inset 0 0 30px var(--gold); }
        @keyframes glow { from { background: #fff; transform: scale(1); } to { background: var(--gold-light); transform: scale(1.05); } }

        .paytable { margin-top: 15px; width: 100%; background: rgba(28, 33, 40, 0.9); border: 1px solid var(--gold); border-radius: 10px; padding: 12px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; box-sizing: border-box; }
        .pay-item { display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; border: 1px solid #333; padding: 5px; border-radius: 5px; }
        .pay-item span:last-child { color: var(--gold-light); font-weight: bold; margin-top: 2px; }

        .chip-box { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }
        .chip { padding: 12px 22px; border: 2px solid var(--gold); border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--gold); transition: 0.2s; }
        .chip.active { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        
        #resBanner { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 40px; border-radius: 25px; z-index: 10001; text-align: center; border: 6px solid var(--gold); box-shadow: 0 0 100px rgba(0,0,0,0.9); }
        .luck-info { font-size: 0.8rem; color: #888; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="card">
        <h1 style="color: var(--red);">SISTEMA BLOQUEADO</h1>
        <button onclick="location.reload()" style="background:var(--red); color:white; border:none; padding:10px; cursor:pointer;">REINTENTAR</button>
    </div>
</div>

<div id="unlockScreen">
    <div class="card">
        <h2 style="color: var(--gold);">SLOT BAR 2026</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="LLAVE">
        <button onclick="tryUnlock()" style="background:var(--red); color:white; border:none; padding:12px; width:100%; cursor:pointer; border-radius:5px;">ENTRAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 10px; font-size: 0.9rem;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="stats-bar">
        <div>SALDO: <span id="balDisplay" style="color: var(--gold-light);">0</span>€</div>
        <div style="color: var(--gold);">BET: <span id="betDisplay">10</span>€</div>
    </div>
    
    <div class="machine-container">
        <div class="machine-body">
            <div class="grid-3x3" id="mainGrid">
                <div id="c0" class="cell">💎</div><div id="c1" class="cell">7️⃣</div><div id="c2" class="cell">🔔</div>
                <div id="c3" class="cell">🍒</div><div id="c4" class="cell">🍉</div><div id="c5" class="cell">🍋</div>
                <div id="c6" class="cell">🍊</div><div id="c7" class="cell">🍓</div><div id="c8" class="cell">🍎</div>
            </div>
        </div>

        <div class="lever-box">
            <div class="auto-controls">
                <input type="number" id="autoCount" class="auto-input" value="0" min="0">
                <small style="font-size: 0.6rem;">AUTO</small>
            </div>
            <div class="lever-base">
                <div id="leverArm" class="lever-arm">
                    <div class="lever-knob" onclick="handleLeverClick()"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="paytable">
        <div class="pay-item"><span>💎</span> <span id="p_diam">--</span></div>
        <div class="pay-item"><span>7️⃣</span> <span id="p_siet">--</span></div>
        <div class="pay-item"><span>🔔</span> <span id="p_camp">--</span></div>
        <div class="pay-item"><span>🍒</span> <span id="p_cher">--</span></div>
        <div class="pay-item"><span>🍉</span> <span id="p_sand">--</span></div>
        <div class="pay-item"><span>🍋</span> <span id="p_limo">--</span></div>
        <div class="pay-item"><span>🍊</span> <span id="p_nara">--</span></div>
        <div class="pay-item"><span>🍇</span> <span id="p_uvas">--</span></div>
        <div class="pay-item"><span>🍎</span> <span id="p_manz">--</span></div>
        <div class="pay-item"><span>🍓</span> <span id="p_fres">--</span></div>
    </div>

    <div class="chip-box">
        <div class="chip active" onclick="setBet(10, this)">10</div>
        <div class="chip" onclick="setBet(50, this)">50</div>
        <div class="chip" onclick="setBet(100, this)">100</div>
    </div>
    
    <div id="luckMsg" class="luck-info">RNG Estándar</div>
</div>

<div id="resBanner">
    <h1 id="resWin" style="font-size:3.5rem; margin:10px 0;">0€</h1>
    <button onclick="closeBanner()" style="background:var(--red); color:white; border:none; padding:15px; width:100%; font-weight:bold; cursor:pointer; border-radius:10px;">COBRAR</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", currentBet = 10, spinning = false;
    let sessionSpins = 0;
    
    // Multiplicadores ajustados: Manzana y Fresa son premios muy bajos para relleno
    const multipliers = { 
        '💎': 50, '7️⃣': 25, '🔔': 15, '🍒': 8, '🍉': 5, 
        '🍋': 3, '🍊': 2, '🍇': 1.5, '🍎': 0.8, '🍓': 0.5 
    };
    
    // Pesos iniciales (Suma 1.0)
    const baseWeights = [
        { s: '💎', w: 0.02 }, { s: '7️⃣', w: 0.04 }, { s: '🔔', w: 0.06 },
        { s: '🍒', w: 0.08 }, { s: '🍉', w: 0.10 }, { s: '🍋', w: 0.12 },
        { s: '🍊', w: 0.13 }, { s: '🍇', w: 0.13 }, 
        { s: '🍎', w: 0.16 }, { s: '🍓', w: 0.16 } 
    ];
    let currentWeights = JSON.parse(JSON.stringify(baseWeights));

    function adjustLuck() {
        sessionSpins++;
        if (sessionSpins % 10 === 0) {
            // Bajamos la probabilidad de los frutos bajos (🍎🍓) para subir los altos
            let weightToTake = 0.03;
            currentWeights[8].w -= weightToTake/2; // Baja Manzana
            currentWeights[9].w -= weightToTake/2; // Baja Fresa
            
            currentWeights[0].w += 0.01; // Sube Diamante
            currentWeights[1].w += 0.01; // Sube Siete
            currentWeights[2].w += 0.01; // Sube Campana
            
            document.getElementById('luckMsg').innerText = "CALENTANDO MÁQUINA... 🔥";
            document.getElementById('luckMsg').style.color = "#ff9800";
        }
    }

    function resetLuck() {
        sessionSpins = 0;
        currentWeights = JSON.parse(JSON.stringify(baseWeights));
        document.getElementById('luckMsg').innerText = "RNG Estándar";
        document.getElementById('luckMsg').style.color = "#888";
    }

    function getRandomSymbol() {
        const rand = Math.random();
        let cumulative = 0;
        for (const item of currentWeights) {
            cumulative += item.w;
            if (rand < cumulative) return item.s;
        }
        return '🍓';
    }

    function handleLeverClick() {
        if (spinning || balance < currentBet) return;
        document.getElementById('leverArm').classList.add('pulling');
        setTimeout(() => {
            document.getElementById('leverArm').classList.remove('pulling');
            startSpin();
        }, 300);
    }

    function startSpin() {
        spinning = true;
        balance -= currentBet;
        db.ref('codes/'+currentKey).update({ saldo: balance });
        adjustLuck();

        document.querySelectorAll('.cell').forEach(c => c.classList.remove('win-glow'));

        let t = 0;
        const allSymbols = Object.keys(multipliers);
        let si = setInterval(() => {
            for(let i=0; i<9; i++) {
                document.getElementById('c'+i).innerText = allSymbols[Math.floor(Math.random()*allSymbols.length)];
            }
            t++;
            if(t > 18) { clearInterval(si); finalizeRealRandom(); }
        }, 60);
    }

    function finalizeRealRandom() {
        let winVal = 0;
        const grid = [];
        for(let i=0; i<9; i++) {
            const sym = getRandomSymbol();
            const cell = document.getElementById('c'+i);
            cell.innerText = sym;
            grid.push(sym);
        }

        const lines = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], 
            [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]
        ];

        lines.forEach(line => {
            if (grid[line[0]] === grid[line[1]] && grid[line[1]] === grid[line[2]]) {
                winVal += (currentBet * multipliers[grid[line[0]]]);
                line.forEach(idx => document.getElementById('c'+idx).classList.add('win-glow'));
            }
        });

        if (winVal > 0) {
            balance += winVal;
            db.ref('codes/'+currentKey).update({ saldo: balance });
            if (winVal >= (currentBet * 40)) resetLuck();

            setTimeout(() => {
                document.getElementById('resWin').innerText = winVal.toFixed(1) + "€";
                document.getElementById('resBanner').style.display = 'block';
            }, 500);
        }

        spinning = false;
        updateUI();

        // Auto Spin
        const autoInp = document.getElementById('autoCount');
        let autoVal = parseInt(autoInp.value);
        if (autoVal > 0 && winVal === 0) {
            autoVal--;
            autoInp.value = autoVal;
            setTimeout(handleLeverClick, 800);
        }
    }

    function closeBanner() {
        document.getElementById('resBanner').style.display = 'none';
        updateUI();
    }

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        if(!key) return;
        const snap = await db.ref('codes/'+key).get();
        if(snap.exists()){
            currentKey = key;
            db.ref('codes/'+currentKey).on('value', s => {
                const d = s.val();
                if(d && d.saldo !== -1) { balance = d.saldo; updateUI(); }
                else if(d && d.saldo === -1) { location.reload(); }
            });
            document.getElementById('unlockScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'flex';
            updatePaytable();
        }
    }

    function setBet(v, el) {
        if(spinning) return;
        currentBet = v;
        document.getElementById('betDisplay').innerText = v;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        updatePaytable();
    }

    function updatePaytable() {
        const mapping = {'💎':'p_diam','7️⃣':'p_siet','🔔':'p_camp','🍒':'p_cher','🍉':'p_sand','🍋':'p_limo','🍊':'p_nara','🍇':'p_uvas','🍎':'p_manz','🍓':'p_fres'};
        for(let sym in multipliers) {
            if(mapping[sym]) document.getElementById(mapping[sym]).innerText = (currentBet * multipliers[sym]).toFixed(1) + "€";
        }
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = Math.floor(balance);
    }
</script>
</body>
</html>
