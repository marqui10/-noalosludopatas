<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slot Bar 2026 - Master Multi-Line</title>
    <style>
        :root {
            --bg: #05070a;
            --gold: #d4af37;
            --gold-light: #f9e29c;
            --red: #be1931;
            --text: #ffffff;
            --slot-bg: #1c2128;
        }
        body { margin: 0; font-family: 'Trebuchet MS', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* --- PANTALLAS DE ACCESO Y BANEO --- */
        #banScreen {
            position: fixed; inset: 0; background: #000;
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;
            color: white; text-align: center;
        }

        .ban-card {
            border: 3px solid var(--red); padding: 50px; border-radius: 20px;
            background: #111; box-shadow: 0 0 50px rgba(190, 25, 49, 0.5);
            max-width: 450px; width: 90%;
        }

        #unlockScreen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }

        .login-card {
            background: #1c2128; padding: 40px; border-radius: 15px;
            border: 2px solid var(--gold); text-align: center; width: 300px;
        }

        input.key-input {
            width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px;
            border: 1px solid var(--gold); font-size: 1.1rem; text-align: center;
            background: #000; color: var(--gold-light); box-sizing: border-box;
        }

        /* --- INTERFAZ JUEGO --- */
        #gameArea { display: none; width: 100%; max-width: 500px; padding: 15px; flex-direction: column; align-items: center; }
        .stats-bar { width: 100%; display: flex; justify-content: space-between; padding: 15px 20px; background: var(--slot-bg); border-radius: 10px; border-bottom: 3px solid var(--gold); margin-bottom: 15px; box-sizing: border-box; font-weight: bold; }

        .machine-body { background: linear-gradient(180deg, #444 0%, #111 100%); padding: 15px; border-radius: 20px; border: 6px solid #555; width: 100%; box-sizing: border-box; box-shadow: 0 10px 0 #222; }
        .grid-3x3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: #000; padding: 10px; border-radius: 10px; }
        .cell { height: 90px; background: #fff; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; color: #000; border-bottom: 4px solid #ccc; }
        
        .win-glow { animation: glow 0.4s infinite alternate; z-index: 10; box-shadow: inset 0 0 25px var(--gold); }
        @keyframes glow { from { background: #fff; transform: scale(1); } to { background: var(--gold-light); transform: scale(1.05); } }

        .main-controls { margin-top: 20px; display: flex; flex-direction: column; gap: 15px; width: 100%; }
        .chip-box { display: flex; gap: 10px; justify-content: center; }
        .chip { padding: 10px 20px; border: 2px solid var(--gold); border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--gold); }
        .chip.active { background: var(--gold); color: black; }
        
        .btn-spin { background: var(--red); color: white; border: none; padding: 20px; font-size: 1.5rem; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 0 #700; width: 100%; }
        .btn-spin:active { transform: translateY(3px); box-shadow: 0 2px 0 #700; }

        #resBanner { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; color: black; padding: 30px; border-radius: 20px; z-index: 10001; text-align: center; border: 5px solid var(--gold); box-shadow: 0 0 50px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="banScreen">
    <div class="ban-card">
        <h1 style="color: var(--red); font-size: 2.5rem; margin-bottom: 10px;">🚫 ACCESO DENEGADO</h1>
        <p id="banReasonText" style="font-size: 1.2rem; font-weight: bold; color: white; margin: 0;">Cuenta suspendida</p>
        <button onclick="location.reload()" class="btn-spin" style="margin-top: 30px; width: 100%; padding: 12px;">REINTENTAR</button>
    </div>
</div>

<div id="unlockScreen">
    <div class="login-card">
        <h2 style="color: var(--gold);">SLOT BAR 2026</h2>
        <input type="password" id="keyInput" class="key-input" placeholder="LLAVE">
        <button onclick="tryUnlock()" class="btn-spin" style="width:100%; padding: 12px;">VALIDAR</button>
        <p id="errorMsg" style="color: var(--red); margin-top: 10px;"></p>
    </div>
</div>

<div id="gameArea">
    <div class="stats-bar">
        <div>SALDO: <span id="balDisplay" style="color: var(--gold-light);">0</span>€</div>
        <div style="color: var(--gold);">BET: <span id="betDisplay">10</span>€</div>
    </div>
    
    <div class="machine-body">
        <div class="grid-3x3" id="mainGrid">
            <div id="c0" class="cell">❌</div><div id="c1" class="cell">❌</div><div id="c2" class="cell">❌</div>
            <div id="c3" class="cell">❌</div><div id="c4" class="cell">❌</div><div id="c5" class="cell">❌</div>
            <div id="c6" class="cell">❌</div><div id="c7" class="cell">❌</div><div id="c8" class="cell">❌</div>
        </div>
    </div>

    <div class="main-controls">
        <div class="chip-box">
            <div class="chip active" onclick="setBet(10, this)">10</div>
            <div class="chip" onclick="setBet(50, this)">50</div>
            <div class="chip" onclick="setBet(100, this)">100</div>
        </div>
        <button id="spinBtn" class="btn-spin" onclick="startSpin()">GIRAR</button>
    </div>
</div>

<div id="resBanner">
    <h2 id="resTitle"></h2>
    <h1 id="resWin"></h1>
    <button onclick="closeBanner()" class="btn-spin" style="font-size: 1rem; padding: 10px;">OK</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAsAVsv0iwnv4cdDNkSyo1jBIYvCyn_pCY",
        authDomain: "rascay-d6d3d.firebaseapp.com",
        databaseURL: "https://rascay-d6d3d-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "rascay-d6d3d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let balance = 0, currentKey = "", isInfinite = false, currentBet = 10, spinning = false, spinInterval = null;
    const multipliers = { '💎': 150, '7️⃣': 75, '🔔': 30, '🍒': 10, '🍉': 5, '🍋': 2 };
    const winLines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

    function setBet(v, el) {
        if(spinning) return;
        currentBet = v;
        document.getElementById('betDisplay').innerText = v;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    async function tryUnlock() {
        const key = document.getElementById('keyInput').value.toUpperCase().trim();
        const snap = await db.ref('codes/'+key).get();
        if(snap.exists()){
            const data = snap.val();
            if (data.saldo === -1) {
                showBan(data.motivoBan);
                return;
            }
            currentKey = key;
            startLiveSecurity(); 
            startGame();
        } else { document.getElementById('errorMsg').innerText = "LLAVE INVÁLIDA"; }
    }

    function showBan(motivo) {
        spinning = false;
        if(spinInterval) clearInterval(spinInterval);
        document.getElementById('unlockScreen').style.display = 'none';
        document.getElementById('gameArea').style.display = 'none';
        document.getElementById('resBanner').style.display = 'none';
        document.getElementById('banScreen').style.display = 'flex';
        document.getElementById('banReasonText').innerText = motivo || "Cuenta suspendida";
    }

    function startLiveSecurity() {
        db.ref('codes/'+currentKey).on('value', snap => {
            if(!snap.exists()) return;
            const data = snap.val();
            if(data.saldo === -1) {
                showBan(data.motivoBan);
            } else {
                isInfinite = (data.saldo.toString().includes("@"));
                balance = isInfinite ? 999999999 : data.saldo;
                updateUI();
            }
        });
    }

    function startGame() {
        document.getElementById('unlockScreen').style.display='none';
        document.getElementById('gameArea').style.display='flex';
        updateUI();
    }

    function startSpin() {
        if (spinning || (!isInfinite && balance < currentBet)) return;
        spinning = true;
        document.querySelectorAll('.cell').forEach(c => c.classList.remove('win-glow'));

        if(!isInfinite) {
            balance -= currentBet;
            db.ref('codes/'+currentKey+'/saldo').set(balance <= 0 ? -1 : balance);
        }

        const roll = Math.random() * 100;
        let winSymbol = null;
        if (roll < 0.5) winSymbol = '💎';
        else if (roll < 1.5) winSymbol = '7️⃣';
        else if (roll < 4) winSymbol = '🔔';
        else if (roll < 8) winSymbol = '🍒';
        else if (roll < 12) winSymbol = '🍉';
        else if (roll < 15) winSymbol = '🍋';

        let times = 0;
        const filler = ['❌', '🍋', '🍉'];
        spinInterval = setInterval(() => {
            for(let i=0; i<9; i++) document.getElementById('c'+i).innerText = filler[Math.floor(Math.random()*filler.length)];
            times++;
            if(times > 20) {
                clearInterval(spinInterval);
                if (winSymbol) {
                    const line = winLines[Math.floor(Math.random() * winLines.length)];
                    line.forEach(idx => document.getElementById('c' + idx).innerText = winSymbol);
                } else {
                    document.getElementById('c4').innerText = '❌';
                }
                processResult();
            }
        }, 60);
    }

    function processResult() {
        const grid = [];
        for(let i=0; i<9; i++) grid.push(document.getElementById('c'+i).innerText);
        let totalWinMult = 0;
        let winIdx = new Set();

        winLines.forEach(line => {
            const [a,b,c] = line;
            if(grid[a] === grid[b] && grid[b] === grid[c] && multipliers[grid[a]]) {
                totalWinMult += multipliers[grid[a]];
                line.forEach(i => winIdx.add(i));
            }
        });

        if (totalWinMult > 0) {
            const prize = currentBet * totalWinMult;
            balance += prize;
            winIdx.forEach(i => document.getElementById('c'+i).classList.add('win-glow'));
            if(!isInfinite) db.ref('codes/'+currentKey+'/saldo').set(balance);
            setTimeout(() => showResult("¡WIN!", prize), 300);
        }
        spinning = false;
        updateUI();
    }

    function updateUI() {
        document.getElementById('balDisplay').innerText = isInfinite ? "∞" : Math.floor(balance);
        document.getElementById('spinBtn').disabled = spinning;
    }

    function showResult(t, a) {
        document.getElementById('resTitle').innerText = t;
        document.getElementById('resWin').innerText = `+${a}€`;
        document.getElementById('resBanner').style.display = 'block';
    }

    function closeBanner() { document.getElementById('resBanner').style.display = 'none'; }
</script>
</body>
</html>
